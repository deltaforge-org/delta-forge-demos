<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ise" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Pill capsule body -->
  <rect x="22" y="24" width="36" height="40" rx="10" fill="url(#ise)" opacity=".15" stroke="url(#ise)" stroke-width="1.5"/>
  <!-- Capsule divider -->
  <line x1="22" y1="44" x2="58" y2="44" stroke="url(#ise)" stroke-width="1" opacity=".4"/>
  <!-- Plus sign (schema evolution) -->
  <rect x="36" y="30" width="8" height="20" rx="1.5" fill="url(#ise)" opacity=".5"/>
  <rect x="30" y="38" width="20" height="4" rx="1.5" fill="url(#ise)" opacity=".5"/>
  <!-- Column lines below divider -->
  <line x1="28" y1="50" x2="40" y2="50" stroke="url(#ise)" stroke-width="1.5" opacity=".6"/>
  <line x1="28" y1="55" x2="44" y2="55" stroke="url(#ise)" stroke-width="1.5" opacity=".6"/>
  <line x1="28" y1="60" x2="48" y2="60" stroke="url(#ise)" stroke-width="1.5" opacity=".4" stroke-dasharray="2 2"/>
  <!-- V3 badge -->
  <rect x="52" y="12" width="18" height="12" rx="3" fill="url(#ise)" opacity=".25" stroke="url(#ise)" stroke-width="1"/>
  <text x="61" y="21" font-family="sans-serif" font-size="8" font-weight="bold" fill="url(#ise)" text-anchor="middle">V3</text>
</svg>
