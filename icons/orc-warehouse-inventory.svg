<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="owi" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Warehouse building -->
  <rect x="12" y="30" width="56" height="38" rx="3" fill="url(#owi)" opacity=".1" stroke="url(#owi)" stroke-width="1.5"/>
  <!-- Roof -->
  <path d="M8 30 L40 12 L72 30" stroke="url(#owi)" stroke-width="1.5" fill="url(#owi)" opacity=".15"/>
  <!-- Shelves -->
  <line x1="18" y1="42" x2="62" y2="42" stroke="url(#owi)" stroke-width="1.5" opacity=".4"/>
  <line x1="18" y1="52" x2="62" y2="52" stroke="url(#owi)" stroke-width="1.5" opacity=".4"/>
  <!-- Boxes on shelves -->
  <rect x="22" y="34" width="8" height="8" rx="1" fill="url(#owi)" opacity=".35"/>
  <rect x="34" y="34" width="8" height="8" rx="1" fill="url(#owi)" opacity=".5"/>
  <rect x="50" y="34" width="8" height="8" rx="1" fill="url(#owi)" opacity=".35"/>
  <rect x="22" y="44" width="8" height="8" rx="1" fill="url(#owi)" opacity=".5"/>
  <rect x="34" y="44" width="8" height="8" rx="1" fill="url(#owi)" opacity=".35"/>
  <rect x="50" y="44" width="8" height="8" rx="1" fill="url(#owi)" opacity=".5"/>
  <!-- Door -->
  <rect x="33" y="55" width="14" height="13" rx="2" fill="url(#owi)" opacity=".25" stroke="url(#owi)" stroke-width="1"/>
</svg>
