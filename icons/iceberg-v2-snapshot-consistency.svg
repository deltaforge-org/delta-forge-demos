<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="isc" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Warehouse roof -->
  <path d="M10 28L40 12L70 28" stroke="url(#isc)" stroke-width="1.8" stroke-linejoin="round" fill="url(#isc)" fill-opacity=".08"/>
  <!-- Warehouse body -->
  <rect x="14" y="28" width="52" height="32" rx="2" fill="url(#isc)" fill-opacity=".06" stroke="url(#isc)" stroke-width="1.5"/>
  <!-- Shelf lines -->
  <line x1="18" y1="38" x2="62" y2="38" stroke="url(#isc)" stroke-width="1" opacity=".3"/>
  <line x1="18" y1="48" x2="62" y2="48" stroke="url(#isc)" stroke-width="1" opacity=".3"/>
  <!-- Boxes on top shelf -->
  <rect x="20" y="30" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.8"/>
  <rect x="30" y="30" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.8"/>
  <rect x="40" y="30" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.8"/>
  <rect x="50" y="30" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".15" stroke="url(#isc)" stroke-width="0.8" stroke-dasharray="1.5 1"/>
  <!-- Boxes on bottom shelf -->
  <rect x="20" y="40" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.8"/>
  <rect x="30" y="40" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".15" stroke="url(#isc)" stroke-width="0.8" stroke-dasharray="1.5 1"/>
  <rect x="40" y="40" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.8"/>
  <rect x="50" y="40" width="8" height="7" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.8"/>
  <!-- Snapshot layers (stacked pages) -->
  <rect x="20" y="52" width="14" height="6" rx="1" fill="url(#isc)" fill-opacity=".12" stroke="url(#isc)" stroke-width="0.7"/>
  <rect x="22" y="54" width="14" height="6" rx="1" fill="url(#isc)" fill-opacity=".16" stroke="url(#isc)" stroke-width="0.7"/>
  <rect x="24" y="56" width="14" height="6" rx="1" fill="url(#isc)" fill-opacity=".2" stroke="url(#isc)" stroke-width="0.7"/>
  <!-- Checkmark (consistency verified) -->
  <circle cx="55" cy="56" r="6" fill="url(#isc)" fill-opacity=".12" stroke="url(#isc)" stroke-width="1.2"/>
  <path d="M51.5 56L54 58.5L58.5 53.5" stroke="url(#isc)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- V2 badge -->
  <text x="40" y="22" text-anchor="middle" font-size="5.5" font-family="monospace" font-weight="bold" fill="url(#isc)" opacity=".8">V2</text>
  <!-- Label -->
  <text x="40" y="74" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#isc)" opacity=".55">SNAPSHOT CONSISTENCY</text>
</svg>
