<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="da" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Ship hull -->
  <path d="M12 42L18 54H62L68 42" stroke="url(#da)" stroke-width="2" fill="url(#da)" fill-opacity=".1"/>
  <rect x="30" y="30" width="20" height="12" rx="1" stroke="url(#da)" stroke-width="1.5" fill="url(#da)" fill-opacity=".06"/>
  <rect x="38" y="22" width="4" height="8" rx="1" fill="url(#da)" fill-opacity=".3"/>
  <!-- Stopwatch -->
  <circle cx="58" cy="18" r="10" stroke="url(#da)" stroke-width="1.5" fill="url(#da)" fill-opacity=".06"/>
  <line x1="58" y1="18" x2="58" y2="12" stroke="url(#da)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="18" x2="63" y2="16" stroke="url(#da)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="56" y1="7" x2="60" y2="7" stroke="url(#da)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Duration arrow -->
  <line x1="14" y1="64" x2="58" y2="64" stroke="url(#da)" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="54,60 58,64 54,68" stroke="url(#da)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Time labels -->
  <text x="14" y="74" font-size="4.5" font-family="monospace" fill="url(#da)" opacity=".6">ENTRY</text>
  <text x="50" y="74" font-size="4.5" font-family="monospace" fill="url(#da)" opacity=".6">EXIT</text>
  <text x="33" y="61" font-size="5" font-family="monospace" fill="url(#da)" opacity=".8">Δt</text>
</svg>
