<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="jtbe" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Credit card body (billing) -->
  <rect x="10" y="22" width="60" height="38" rx="5" fill="url(#jtbe)" opacity=".15" stroke="url(#jtbe)" stroke-width="1.5"/>
  <!-- Magnetic stripe -->
  <rect x="10" y="29" width="60" height="6" fill="url(#jtbe)" opacity=".4"/>
  <!-- Card number group 1 -->
  <rect x="16" y="42" width="10" height="3" rx=".5" fill="url(#jtbe)" opacity=".55"/>
  <!-- Card number group 2 -->
  <rect x="29" y="42" width="10" height="3" rx=".5" fill="url(#jtbe)" opacity=".45"/>
  <!-- Card number group 3 -->
  <rect x="42" y="42" width="10" height="3" rx=".5" fill="url(#jtbe)" opacity=".35"/>
  <!-- Card number group 4 -->
  <rect x="55" y="42" width="10" height="3" rx=".5" fill="url(#jtbe)" opacity=".25"/>
  <!-- Cardholder name line -->
  <rect x="16" y="50" width="22" height="2.5" rx=".5" fill="url(#jtbe)" opacity=".5"/>
  <!-- Chip -->
  <rect x="55" y="49" width="10" height="7" rx="1.5" fill="url(#jtbe)" opacity=".7"/>
  <!-- JSON brace (left) -->
  <path d="M9 14C7 14 6 15 6 17C6 19 7 20 7 22C7 24 6 25 6 27C6 29 7 30 9 30" stroke="url(#jtbe)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity=".75"/>
  <!-- JSON brace (right) -->
  <path d="M71 14C73 14 74 15 74 17C74 19 73 20 73 22C73 24 74 25 74 27C74 29 73 30 71 30" stroke="url(#jtbe)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity=".75"/>
  <!-- Dollar sign in the gap between braces -->
  <path d="M40 12V28" stroke="url(#jtbe)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M44 16C44 14 42 13 40 13C38 13 36 14 36 16C36 18 38 19 40 19C42 19 44 20 44 22C44 24 42 25 40 25C38 25 36 24 36 22" stroke="url(#jtbe)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Tag (list element accent, bottom right) -->
  <path d="M50 64L62 64L70 72L62 72Z" fill="url(#jtbe)" opacity=".35" stroke="url(#jtbe)" stroke-width="1.2" stroke-linejoin="round"/>
