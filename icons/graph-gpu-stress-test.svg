<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="gpuSt" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- GPU chip body -->
  <rect x="18" y="18" width="44" height="44" rx="4" fill="url(#gpuSt)" opacity=".15" stroke="url(#gpuSt)" stroke-width="1.5"/>
  <!-- Inner die -->
  <rect x="26" y="26" width="28" height="28" rx="2" fill="url(#gpuSt)" opacity=".3" stroke="url(#gpuSt)" stroke-width="1"/>
  <!-- GPU grid (4x4 compute cores) -->
  <rect x="30" y="30" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="37" y="30" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="44" y="30" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="30" y="37" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="37" y="37" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".6"/>
  <rect x="44" y="37" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="30" y="44" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="37" y="44" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <rect x="44" y="44" width="5" height="5" rx="1" fill="url(#gpuSt)" opacity=".5"/>
  <!-- Pin rows — top -->
  <line x1="26" y1="18" x2="26" y2="10" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="33" y1="18" x2="33" y2="10" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="40" y1="18" x2="40" y2="10" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="47" y1="18" x2="47" y2="10" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="54" y1="18" x2="54" y2="10" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <!-- Pin rows — bottom -->
  <line x1="26" y1="62" x2="26" y2="70" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="33" y1="62" x2="33" y2="70" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="40" y1="62" x2="40" y2="70" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="47" y1="62" x2="47" y2="70" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="54" y1="62" x2="54" y2="70" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <!-- Pin rows — left -->
  <line x1="18" y1="26" x2="10" y2="26" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="18" y1="33" x2="10" y2="33" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="18" y1="40" x2="10" y2="40" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="18" y1="47" x2="10" y2="47" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="18" y1="54" x2="10" y2="54" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <!-- Pin rows — right -->
  <line x1="62" y1="26" x2="70" y2="26" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="62" y1="33" x2="70" y2="33" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="62" y1="40" x2="70" y2="40" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="62" y1="47" x2="70" y2="47" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <line x1="62" y1="54" x2="70" y2="54" stroke="url(#gpuSt)" stroke-width="1.5" opacity=".4"/>
  <!-- Network graph overlay on chip -->
  <circle cx="32" cy="32" r="2" fill="url(#gpuSt)" opacity=".8"/>
  <circle cx="48" cy="32" r="2" fill="url(#gpuSt)" opacity=".8"/>
  <circle cx="40" cy="40" r="2.5" fill="url(#gpuSt)" opacity=".9"/>
  <circle cx="32" cy="48" r="2" fill="url(#gpuSt)" opacity=".8"/>
  <circle cx="48" cy="48" r="2" fill="url(#gpuSt)" opacity=".8"/>
  <line x1="32" y1="32" x2="40" y2="40" stroke="url(#gpuSt)" stroke-width="0.8" opacity=".6"/>
  <line x1="48" y1="32" x2="40" y2="40" stroke="url(#gpuSt)" stroke-width="0.8" opacity=".6"/>
  <line x1="32" y1="48" x2="40" y2="40" stroke="url(#gpuSt)" stroke-width="0.8" opacity=".6"/>
  <line x1="48" y1="48" x2="40" y2="40" stroke="url(#gpuSt)" stroke-width="0.8" opacity=".6"/>
  <line x1="32" y1="32" x2="48" y2="32" stroke="url(#gpuSt)" stroke-width="0.8" opacity=".4"/>
  <line x1="32" y1="48" x2="48" y2="48" stroke="url(#gpuSt)" stroke-width="0.8" opacity=".4"/>
</svg>
