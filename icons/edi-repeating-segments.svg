<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rs" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Grid/table expanding horizontally -->
  <!-- Header row -->
  <rect x="8" y="14" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.5" fill="url(#rs)" fill-opacity=".25"/>
  <rect x="26" y="14" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.5" fill="url(#rs)" fill-opacity=".25"/>
  <rect x="44" y="14" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.5" fill="url(#rs)" fill-opacity=".15"/>
  <rect x="62" y="14" width="12" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".08" stroke-dasharray="2 2"/>
  <!-- Row 2 -->
  <rect x="8" y="28" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".15"/>
  <rect x="26" y="28" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".15"/>
  <rect x="44" y="28" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".08"/>
  <rect x="62" y="28" width="12" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1" fill="url(#rs)" fill-opacity=".05" stroke-dasharray="2 2"/>
  <!-- Row 3 -->
  <rect x="8" y="42" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".15"/>
  <rect x="26" y="42" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".15"/>
  <rect x="44" y="42" width="16" height="10" rx="1.5" stroke="url(#rs)" stroke-width="1.2" fill="url(#rs)" fill-opacity=".08"/>
  <!-- Numbered labels 1, 2, 3 -->
  <text x="14" y="21" font-family="monospace" font-size="7" fill="url(#rs)" text-anchor="middle" opacity=".7">N1₁</text>
  <text x="32" y="21" font-family="monospace" font-size="7" fill="url(#rs)" text-anchor="middle" opacity=".7">N1₂</text>
  <text x="50" y="21" font-family="monospace" font-size="7" fill="url(#rs)" text-anchor="middle" opacity=".7">N1₃</text>
  <!-- Expand arrow -->
  <path d="M40 58L40 68" stroke="url(#rs)" stroke-width="2" stroke-linecap="round"/>
  <path d="M34 62L40 68L46 62" stroke="url(#rs)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Three mode labels -->
  <text x="16" y="76" font-family="sans-serif" font-size="5.5" fill="url(#rs)" text-anchor="middle" opacity=".5">IDX</text>
  <text x="40" y="76" font-family="sans-serif" font-size="5.5" fill="url(#rs)" text-anchor="middle" opacity=".5">CAT</text>
  <text x="64" y="76" font-family="sans-serif" font-size="5.5" fill="url(#rs)" text-anchor="middle" opacity=".5">JSON</text>
</svg>
