<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="olt" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Lifecycle chain: 5 connected nodes -->
  <!-- Node 1: Order (document) -->
  <rect x="6" y="10" width="14" height="12" rx="2" stroke="url(#olt)" stroke-width="1.5" fill="url(#olt)" fill-opacity=".2"/>
  <line x1="9" y1="14" x2="17" y2="14" stroke="url(#olt)" stroke-width=".8" opacity=".5"/>
  <line x1="9" y1="17" x2="15" y2="17" stroke="url(#olt)" stroke-width=".8" opacity=".5"/>
  <!-- Arrow 1→2 -->
  <path d="M22 16L30 16" stroke="url(#olt)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M28 13L31 16L28 19" stroke="url(#olt)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Node 2: Ack (checkmark) -->
  <circle cx="40" cy="16" r="8" stroke="url(#olt)" stroke-width="1.5" fill="url(#olt)" fill-opacity=".15"/>
  <path d="M36 16L39 19L44 13" stroke="url(#olt)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow 2→3 -->
  <path d="M49 16L57 16" stroke="url(#olt)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M55 13L58 16L55 19" stroke="url(#olt)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Node 3: Ship (truck) -->
  <rect x="60" y="10" width="14" height="10" rx="2" stroke="url(#olt)" stroke-width="1.5" fill="url(#olt)" fill-opacity=".2"/>
  <circle cx="64" cy="22" r="2" stroke="url(#olt)" stroke-width="1" fill="url(#olt)" fill-opacity=".3"/>
  <circle cx="70" cy="22" r="2" stroke="url(#olt)" stroke-width="1" fill="url(#olt)" fill-opacity=".3"/>
  <!-- Arrow 3→4 (downward) -->
  <path d="M67 26L67 34" stroke="url(#olt)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64 32L67 35L70 32" stroke="url(#olt)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Node 4: Invoice ($) -->
  <rect x="60" y="37" width="14" height="12" rx="2" stroke="url(#olt)" stroke-width="1.5" fill="url(#olt)" fill-opacity=".2"/>
  <text x="67" y="46" font-family="monospace" font-size="10" fill="url(#olt)" text-anchor="middle" opacity=".7">$</text>
  <!-- Arrow 4→5 (leftward) -->
  <path d="M58 43L50 43" stroke="url(#olt)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52 40L49 43L52 46" stroke="url(#olt)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Node 5: Receipt (inbox/box) -->
  <rect x="33" y="37" width="14" height="12" rx="2" stroke="url(#olt)" stroke-width="1.5" fill="url(#olt)" fill-opacity=".2"/>
  <path d="M37 40L40 43L43 40" stroke="url(#olt)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".7"/>
  <!-- Labels -->
  <text x="13" y="30" font-family="sans-serif" font-size="5" fill="url(#olt)" text-anchor="middle" opacity=".5">850</text>
  <text x="40" y="30" font-family="sans-serif" font-size="5" fill="url(#olt)" text-anchor="middle" opacity=".5">855</text>
  <text x="67" y="6" font-family="sans-serif" font-size="5" fill="url(#olt)" text-anchor="middle" opacity=".5">856</text>
  <text x="67" y="56" font-family="sans-serif" font-size="5" fill="url(#olt)" text-anchor="middle" opacity=".5">810</text>
  <text x="40" y="56" font-family="sans-serif" font-size="5" fill="url(#olt)" text-anchor="middle" opacity=".5">861</text>
  <!-- Timeline bar at bottom -->
  <line x1="10" y1="66" x2="70" y2="66" stroke="url(#olt)" stroke-width="1" opacity=".3"/>
  <circle cx="10" cy="66" r="2" fill="url(#olt)" opacity=".4"/>
  <circle cx="25" cy="66" r="2" fill="url(#olt)" opacity=".4"/>
  <circle cx="40" cy="66" r="2" fill="url(#olt)" opacity=".4"/>
  <circle cx="55" cy="66" r="2" fill="url(#olt)" opacity=".4"/>
  <circle cx="70" cy="66" r="2" fill="url(#olt)" opacity=".4"/>
  <text x="40" y="75" font-family="sans-serif" font-size="5" fill="url(#olt)" text-anchor="middle" opacity=".4">order → ack → ship → invoice → receipt</text>
</svg>
