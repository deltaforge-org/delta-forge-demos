<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ao" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Lock body (immutability) -->
  <rect x="26" y="34" width="28" height="22" rx="3" stroke="url(#ao)" stroke-width="2" fill="url(#ao)" fill-opacity=".10"/>
  <!-- Lock shackle -->
  <path d="M32 34V26C32 21.6 35.6 18 40 18C44.4 18 48 21.6 48 26V34" stroke="url(#ao)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Down arrow in lock (append-only: data goes in, doesn't come out) -->
  <line x1="40" y1="40" x2="40" y2="50" stroke="url(#ao)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 47L40 51L44 47" stroke="url(#ao)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Event stream lines (stacked log entries) -->
  <line x1="22" y1="64" x2="58" y2="64" stroke="url(#ao)" stroke-width="1.5" opacity=".4"/>
  <line x1="22" y1="68" x2="52" y2="68" stroke="url(#ao)" stroke-width="1.5" opacity=".3"/>
  <line x1="22" y1="72" x2="46" y2="72" stroke="url(#ao)" stroke-width="1.5" opacity=".2"/>
  <!-- Plus sign (append) -->
  <circle cx="60" cy="20" r="8" stroke="url(#ao)" stroke-width="1.5" fill="url(#ao)" fill-opacity=".15"/>
  <line x1="56" y1="20" x2="64" y2="20" stroke="url(#ao)" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="16" x2="60" y2="24" stroke="url(#ao)" stroke-width="2" stroke-linecap="round"/>
</svg>
