<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="psn" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Circuit board / chip body -->
  <rect x="22" y="22" width="36" height="36" rx="4" fill="url(#psn)" opacity=".15" stroke="url(#psn)" stroke-width="1.5"/>
  <!-- Inner chip die -->
  <rect x="30" y="30" width="20" height="20" rx="2" fill="url(#psn)" opacity=".25"/>
  <!-- Pin traces — top -->
  <line x1="32" y1="22" x2="32" y2="14" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="22" x2="40" y2="14" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="22" x2="48" y2="14" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pin traces — bottom -->
  <line x1="32" y1="58" x2="32" y2="66" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="58" x2="40" y2="66" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="58" x2="48" y2="66" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pin traces — left -->
  <line x1="22" y1="32" x2="14" y2="32" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="40" x2="14" y2="40" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="48" x2="14" y2="48" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pin traces — right -->
  <line x1="58" y1="32" x2="66" y2="32" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="40" x2="66" y2="40" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="48" x2="66" y2="48" stroke="url(#psn)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pin dots -->
  <circle cx="32" cy="12" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="40" cy="12" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="48" cy="12" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="32" cy="68" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="40" cy="68" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="48" cy="68" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="12" cy="32" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="12" cy="40" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="12" cy="48" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="68" cy="32" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="68" cy="40" r="2" fill="url(#psn)" opacity=".6"/>
  <circle cx="68" cy="48" r="2" fill="url(#psn)" opacity=".6"/>
  <!-- Sensor signal waves on chip -->
  <path d="M34 38 Q37 34 40 38 Q43 42 46 38" stroke="url(#psn)" stroke-width="1.5" fill="none" opacity=".7"/>
  <path d="M34 42 Q37 38 40 42 Q43 46 46 42" stroke="url(#psn)" stroke-width="1.5" fill="none" opacity=".5"/>
</svg>
