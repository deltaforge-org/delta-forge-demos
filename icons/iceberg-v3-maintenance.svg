<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="imn" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7e22ce"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Gear (maintenance) -->
  <circle cx="40" cy="38" r="16" fill="url(#imn)" opacity=".12" stroke="url(#imn)" stroke-width="1.5"/>
  <circle cx="40" cy="38" r="8" fill="none" stroke="url(#imn)" stroke-width="1.5" opacity=".4"/>
  <!-- Gear teeth -->
  <rect x="37" y="18" width="6" height="8" rx="1" fill="url(#imn)" opacity=".35"/>
  <rect x="37" y="50" width="6" height="8" rx="1" fill="url(#imn)" opacity=".35"/>
  <rect x="20" y="35" width="8" height="6" rx="1" fill="url(#imn)" opacity=".35"/>
  <rect x="52" y="35" width="8" height="6" rx="1" fill="url(#imn)" opacity=".35"/>
  <!-- Diagonal teeth -->
  <rect x="24" y="22" width="6" height="6" rx="1" fill="url(#imn)" opacity=".25" transform="rotate(45 27 25)"/>
  <rect x="50" y="22" width="6" height="6" rx="1" fill="url(#imn)" opacity=".25" transform="rotate(45 53 25)"/>
  <rect x="24" y="48" width="6" height="6" rx="1" fill="url(#imn)" opacity=".25" transform="rotate(45 27 51)"/>
  <rect x="50" y="48" width="6" height="6" rx="1" fill="url(#imn)" opacity=".25" transform="rotate(45 53 51)"/>
  <!-- Center dot -->
  <circle cx="40" cy="38" r="3" fill="url(#imn)" opacity=".5"/>
  <!-- Dollar/SaaS indicator -->
  <rect x="28" y="62" width="24" height="8" rx="2" fill="url(#imn)" opacity=".15" stroke="url(#imn)" stroke-width="1"/>
  <text x="40" y="69" font-family="sans-serif" font-size="6" font-weight="bold" fill="url(#imn)" opacity=".6" text-anchor="middle">SaaS</text>
</svg>
