<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ts" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Clock circle -->
  <circle cx="26" cy="28" r="16" stroke="url(#ts)" stroke-width="1.5" fill="url(#ts)" fill-opacity=".1"/>
  <!-- Clock hands -->
  <line x1="26" y1="28" x2="26" y2="18" stroke="url(#ts)" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
  <line x1="26" y1="28" x2="34" y2="28" stroke="url(#ts)" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
  <!-- Clock center dot -->
  <circle cx="26" cy="28" r="1.2" fill="url(#ts)" opacity=".7"/>
  <!-- Hour ticks -->
  <line x1="26" y1="13" x2="26" y2="15" stroke="url(#ts)" stroke-width="1" opacity=".4"/>
  <line x1="26" y1="41" x2="26" y2="43" stroke="url(#ts)" stroke-width="1" opacity=".4"/>
  <line x1="11" y1="28" x2="13" y2="28" stroke="url(#ts)" stroke-width="1" opacity=".4"/>
  <line x1="39" y1="28" x2="41" y2="28" stroke="url(#ts)" stroke-width="1" opacity=".4"/>
  <!-- Arrow from clock to partitions -->
  <line x1="44" y1="28" x2="50" y2="28" stroke="url(#ts)" stroke-width="1.5" opacity=".5"/>
  <polyline points="48,25 51,28 48,31" stroke="url(#ts)" stroke-width="1" fill="none" opacity=".5"/>
  <!-- Time-based partition columns -->
  <rect x="54" y="8" width="10" height="16" rx="2" stroke="url(#ts)" stroke-width="1" fill="url(#ts)" fill-opacity=".2"/>
  <rect x="56" y="11" width="6" height="2" rx="1" fill="url(#ts)" opacity=".4"/>
  <rect x="56" y="15" width="6" height="2" rx="1" fill="url(#ts)" opacity=".35"/>
  <text x="59" y="28" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ts)" opacity=".6">JAN</text>
  <rect x="54" y="32" width="10" height="16" rx="2" stroke="url(#ts)" stroke-width="1" fill="url(#ts)" fill-opacity=".15"/>
  <rect x="56" y="35" width="6" height="2" rx="1" fill="url(#ts)" opacity=".4"/>
  <rect x="56" y="39" width="6" height="2" rx="1" fill="url(#ts)" opacity=".35"/>
  <text x="59" y="52" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ts)" opacity=".6">FEB</text>
  <rect x="54" y="56" width="10" height="16" rx="2" stroke="url(#ts)" stroke-width="1" fill="url(#ts)" fill-opacity=".2"/>
  <rect x="56" y="59" width="6" height="2" rx="1" fill="url(#ts)" opacity=".4"/>
  <rect x="56" y="63" width="6" height="2" rx="1" fill="url(#ts)" opacity=".35"/>
  <text x="59" y="76" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ts)" opacity=".6">MAR</text>
  <!-- Label -->
  <text x="40" y="78" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#ts)" opacity=".6">TIME-SERIES</text>
</svg>
