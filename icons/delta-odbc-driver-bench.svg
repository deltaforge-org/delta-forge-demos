<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="odb" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Throughput gauge arc -->
  <path d="M14 38 A26 26 0 0 1 66 38" stroke="url(#odb)" stroke-width="2" stroke-linecap="round" fill="none" opacity=".9"/>
  <!-- Tick marks across the arc -->
  <line x1="14"   y1="38"   x2="17"   y2="36"   stroke="url(#odb)" stroke-width="1.5" opacity=".7"/>
  <line x1="22.4" y1="25.6" x2="24.5" y2="28"   stroke="url(#odb)" stroke-width="1.5" opacity=".7"/>
  <line x1="40"   y1="14"   x2="40"   y2="18"   stroke="url(#odb)" stroke-width="1.5" opacity=".7"/>
  <line x1="57.6" y1="25.6" x2="55.5" y2="28"   stroke="url(#odb)" stroke-width="1.5" opacity=".7"/>
  <line x1="66"   y1="38"   x2="63"   y2="36"   stroke="url(#odb)" stroke-width="1.5" opacity=".7"/>
  <!-- Needle (pointing high-throughput, ~70% deflection) -->
  <line x1="40" y1="38" x2="58" y2="20" stroke="url(#odb)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="40" cy="38" r="3" fill="url(#odb)" opacity=".9"/>
  <!-- Stacked benchmark tiers (representing the 10 tables of varying widths) -->
  <rect x="14" y="50" width="52" height="3" rx="1" fill="url(#odb)" opacity=".55"/>
  <rect x="14" y="55" width="40" height="3" rx="1" fill="url(#odb)" opacity=".45"/>
  <rect x="14" y="60" width="32" height="3" rx="1" fill="url(#odb)" opacity=".4"/>
  <rect x="14" y="65" width="22" height="3" rx="1" fill="url(#odb)" opacity=".35"/>
  <rect x="14" y="70" width="14" height="3" rx="1" fill="url(#odb)" opacity=".3"/>
</svg>
