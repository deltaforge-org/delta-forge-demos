<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="intt" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Clock face -->
  <circle cx="40" cy="38" r="22" fill="url(#intt)" opacity=".15" stroke="url(#intt)" stroke-width="1.5"/>
  <!-- Hour markers -->
  <line x1="40" y1="18" x2="40" y2="22" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="54" x2="40" y2="58" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="38" x2="24" y2="38" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="38" x2="60" y2="38" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="40" y1="38" x2="40" y2="26" stroke="url(#intt)" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="40" y1="38" x2="50" y2="32" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="40" cy="38" r="2" fill="url(#intt)" opacity=".8"/>
  <!-- Rewind arrow (time travel) -->
  <path d="M22 62 L14 66 L18 58" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M14 66 C14 66 20 70 32 70 C48 70 58 66 62 62" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Stock chart line -->
  <polyline points="18,14 26,10 34,12 42,8 50,11 58,7 66,10" stroke="url(#intt)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".5"/>
</svg>
