  <line x1="24" y1="30" x2="48" y2="30" stroke="url(#nh)" stroke-width="1.5" opacity=".3"/>
  <path d="M52 28l2 2 4-4" stroke="url(#nh)" stroke-width="1.5" opacity=".6"/>
