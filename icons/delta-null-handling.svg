<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="nh" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#475569"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Clipboard -->
  <rect x="16" y="14" width="48" height="56" rx="4" fill="url(#nh)" opacity=".1" stroke="url(#nh)" stroke-width="1.5"/>
