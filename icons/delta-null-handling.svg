  <text x="54" y="43" font-size="10" font-family="monospace" fill="url(#nh)" opacity=".6">?</text>
  <line x1="24" y1="50" x2="48" y2="50" stroke="url(#nh)" stroke-width="1.5" opacity=".3"/>
  <path d="M52 48l2 2 4-4" stroke="url(#nh)" stroke-width="1.5" opacity=".6"/>
  <line x1="24" y1="60" x2="48" y2="60" stroke="url(#nh)" stroke-width="1.5" opacity=".3"/>
  <text x="54" y="63" font-size="10" font-family="monospace" fill="url(#nh)" opacity=".6">?</text>
  <!-- NULL label -->
  <text x="40" y="76" text-anchor="middle" font-size="8" font-family="monospace" fill="url(#nh)" opacity=".6">NULL</text>
