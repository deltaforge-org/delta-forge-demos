  <circle cx="22" cy="32" r="6" stroke="url(#cvc)" stroke-width="2" fill="url(#cvc)" fill-opacity=".15"/>
  <circle cx="34" cy="24" r="6" stroke="url(#cvc)" stroke-width="2" fill="url(#cvc)" fill-opacity=".15"/>
  <circle cx="46" cy="24" r="6" stroke="url(#cvc)" stroke-width="2" fill="url(#cvc)" fill-opacity=".15"/>
  <circle cx="58" cy="32" r="6" stroke="url(#cvc)" stroke-width="2" fill="url(#cvc)" fill-opacity=".15"/>
</svg>
