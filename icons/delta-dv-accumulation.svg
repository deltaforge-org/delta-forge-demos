<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="dva" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Data file block -->
  <rect x="12" y="8" width="28" height="42" rx="3" stroke="url(#dva)" stroke-width="1.5" fill="url(#dva)" fill-opacity=".1"/>
  <!-- Data rows -->
  <rect x="16" y="13" width="20" height="3" rx="1" fill="url(#dva)" opacity=".5"/>
  <rect x="16" y="19" width="20" height="3" rx="1" fill="url(#dva)" opacity=".4"/>
  <rect x="16" y="25" width="20" height="3" rx="1" fill="url(#dva)" opacity=".3"/>
  <rect x="16" y="31" width="20" height="3" rx="1" fill="url(#dva)" opacity=".25"/>
  <rect x="16" y="37" width="20" height="3" rx="1" fill="url(#dva)" opacity=".2"/>
  <rect x="16" y="43" width="20" height="3" rx="1" fill="url(#dva)" opacity=".15"/>
  <!-- Strikethroughs accumulating (more = worse) -->
  <line x1="15" y1="20" x2="37" y2="20" stroke="url(#dva)" stroke-width="1" opacity=".6"/>
  <line x1="15" y1="26" x2="37" y2="26" stroke="url(#dva)" stroke-width="1" opacity=".7"/>
  <line x1="15" y1="32" x2="37" y2="32" stroke="url(#dva)" stroke-width="1" opacity=".8"/>
  <line x1="15" y1="38" x2="37" y2="38" stroke="url(#dva)" stroke-width="1" opacity=".9"/>
  <!-- Stacking DV files (growing pile) -->
  <rect x="48" y="34" width="14" height="10" rx="2" stroke="url(#dva)" stroke-width="1" fill="url(#dva)" fill-opacity=".15"/>
  <rect x="50" y="28" width="14" height="10" rx="2" stroke="url(#dva)" stroke-width="1" fill="url(#dva)" fill-opacity=".2"/>
  <rect x="52" y="22" width="14" height="10" rx="2" stroke="url(#dva)" stroke-width="1" fill="url(#dva)" fill-opacity=".25"/>
  <rect x="54" y="16" width="14" height="10" rx="2" stroke="url(#dva)" stroke-width="1" fill="url(#dva)" fill-opacity=".3"/>
  <!-- Warning triangle -->
  <path d="M57 52L63 42L69 52Z" stroke="url(#dva)" stroke-width="1.5" fill="url(#dva)" fill-opacity=".3"/>
  <text x="63" y="50" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#dva)" font-weight="bold">!</text>
  <!-- Label -->
  <text x="40" y="74" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#dva)" opacity=".6">DV BUILDUP</text>
</svg>
