<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="imp" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip (V2 marker) -->
  <path d="M40 4L50 18H30Z" fill="url(#imp)" fill-opacity=".2" stroke="url(#imp)" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="40" y="15" text-anchor="middle" font-size="6" font-family="monospace" font-weight="bold" fill="url(#imp)" opacity=".9">V2</text>
  <!-- Waterline -->
  <path d="M8 20H72" stroke="url(#imp)" stroke-width="1" opacity=".35" stroke-dasharray="3 2"/>
  <!-- Cloud -->
  <path d="M22 32C22 28 25 25 29 25C30 22 34 20 38 20C43 20 47 23 48 27C51 27 54 30 54 33C54 37 51 39 48 39H26C23 39 22 36 22 34Z" fill="url(#imp)" fill-opacity=".12" stroke="url(#imp)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Rain drops from cloud -->
  <line x1="30" y1="41" x2="28" y2="46" stroke="url(#imp)" stroke-width="1.2" opacity=".5" stroke-linecap="round"/>
  <line x1="38" y1="41" x2="36" y2="46" stroke="url(#imp)" stroke-width="1.2" opacity=".5" stroke-linecap="round"/>
  <line x1="46" y1="41" x2="44" y2="46" stroke="url(#imp)" stroke-width="1.2" opacity=".5" stroke-linecap="round"/>
  <!-- Thermometer body -->
  <rect x="61" y="24" width="6" height="28" rx="3" fill="url(#imp)" fill-opacity=".1" stroke="url(#imp)" stroke-width="1.5"/>
  <!-- Thermometer bulb -->
  <circle cx="64" cy="55" r="5" fill="url(#imp)" fill-opacity=".15" stroke="url(#imp)" stroke-width="1.5"/>
  <circle cx="64" cy="55" r="2.5" fill="url(#imp)" fill-opacity=".5"/>
  <!-- Thermometer mercury -->
  <rect x="63" y="34" width="2" height="18" rx="1" fill="url(#imp)" fill-opacity=".45"/>
  <!-- Thermometer ticks -->
  <line x1="59" y1="30" x2="61" y2="30" stroke="url(#imp)" stroke-width="1" opacity=".4"/>
  <line x1="59" y1="36" x2="61" y2="36" stroke="url(#imp)" stroke-width="1" opacity=".4"/>
  <line x1="59" y1="42" x2="61" y2="42" stroke="url(#imp)" stroke-width="1" opacity=".4"/>
  <!-- Partition grid (2x3 for multi-partition) -->
  <rect x="12" y="52" width="14" height="8" rx="1.5" fill="url(#imp)" fill-opacity=".08" stroke="url(#imp)" stroke-width="1" opacity=".6"/>
  <rect x="28" y="52" width="14" height="8" rx="1.5" fill="url(#imp)" fill-opacity=".14" stroke="url(#imp)" stroke-width="1" opacity=".6"/>
  <rect x="44" y="52" width="14" height="8" rx="1.5" fill="url(#imp)" fill-opacity=".08" stroke="url(#imp)" stroke-width="1" opacity=".6"/>
  <rect x="12" y="62" width="14" height="8" rx="1.5" fill="url(#imp)" fill-opacity=".14" stroke="url(#imp)" stroke-width="1" opacity=".6"/>
  <rect x="28" y="62" width="14" height="8" rx="1.5" fill="url(#imp)" fill-opacity=".08" stroke="url(#imp)" stroke-width="1" opacity=".6"/>
  <rect x="44" y="62" width="14" height="8" rx="1.5" fill="url(#imp)" fill-opacity=".14" stroke="url(#imp)" stroke-width="1" opacity=".6"/>
  <!-- Label -->
  <text x="40" y="78" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#imp)" opacity=".6">MULTI-PARTITION</text>
</svg>
