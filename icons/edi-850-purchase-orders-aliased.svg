<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="poa" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b45309"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <!-- Clipboard body -->
  <rect x="16" y="14" width="48" height="58" rx="3" stroke="url(#poa)" stroke-width="1.8" fill="url(#poa)" fill-opacity=".15"/>
  <!-- Clipboard clip -->
  <rect x="30" y="8" width="20" height="10" rx="2" stroke="url(#poa)" stroke-width="1.6" fill="url(#poa)" fill-opacity=".4"/>
  <rect x="34" y="11" width="12" height="4" rx="1" fill="url(#poa)" opacity=".7"/>
  <!-- PO header label band (aliased column hint) -->
  <rect x="22" y="22" width="36" height="7" rx="1.2" fill="url(#poa)" fill-opacity=".3"/>
  <text x="40" y="27.3" font-family="monospace" font-size="4.4" fill="url(#poa)" text-anchor="middle" opacity=".85">po_number</text>
  <!-- Line item rows (stacked boxes representing PO1 to_json array) -->
  <rect x="22" y="33" width="36" height="6" rx="1" stroke="url(#poa)" stroke-width="1" fill="url(#poa)" fill-opacity=".15"/>
  <rect x="22" y="41" width="36" height="6" rx="1" stroke="url(#poa)" stroke-width="1" fill="url(#poa)" fill-opacity=".15"/>
  <rect x="22" y="49" width="36" height="6" rx="1" stroke="url(#poa)" stroke-width="1" fill="url(#poa)" fill-opacity=".15"/>
  <rect x="22" y="57" width="36" height="6" rx="1" stroke="url(#poa)" stroke-width="1" fill="url(#poa)" fill-opacity=".15"/>
  <!-- Line ID dots on the left of each row -->
  <circle cx="26" cy="36" r="1.2" fill="url(#poa)" opacity=".75"/>
  <circle cx="26" cy="44" r="1.2" fill="url(#poa)" opacity=".75"/>
  <circle cx="26" cy="52" r="1.2" fill="url(#poa)" opacity=".75"/>
  <circle cx="26" cy="60" r="1.2" fill="url(#poa)" opacity=".75"/>
  <!-- Tiny SKU lines on the right of each row -->
  <rect x="32" y="35" width="22" height="2" rx="0.5" fill="url(#poa)" opacity=".55"/>
  <rect x="32" y="43" width="22" height="2" rx="0.5" fill="url(#poa)" opacity=".55"/>
  <rect x="32" y="51" width="22" height="2" rx="0.5" fill="url(#poa)" opacity=".55"/>
  <rect x="32" y="59" width="18" height="2" rx="0.5" fill="url(#poa)" opacity=".55"/>
  <!-- JSON-array brackets at the bottom indicating to_json -->
  <text x="22" y="72" font-family="monospace" font-size="6" fill="url(#poa)" opacity=".7">[</text>
  <text x="58" y="72" font-family="monospace" font-size="6" fill="url(#poa)" text-anchor="end" opacity=".7">]</text>
</svg>
