<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="fhbi" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Hospital building base -->
  <rect x="14" y="34" width="36" height="36" rx="2" fill="url(#fhbi)" fill-opacity=".18" stroke="url(#fhbi)" stroke-width="1.4"/>
  <!-- Roof / pediment -->
  <path d="M12 34L32 20L52 34Z" fill="url(#fhbi)" fill-opacity=".28" stroke="url(#fhbi)" stroke-width="1.4"/>
  <!-- Medical cross on hospital -->
  <rect x="28" y="44" width="8" height="2.5" rx="1.25" fill="url(#fhbi)" opacity=".75"/>
  <rect x="30.75" y="41.25" width="2.5" height="8" rx="1.25" fill="url(#fhbi)" opacity=".75"/>
  <!-- Hospital windows (lower row) -->
  <rect x="18" y="56" width="6" height="6" rx="0.6" fill="url(#fhbi)" fill-opacity=".25"/>
  <rect x="26" y="56" width="6" height="6" rx="0.6" fill="url(#fhbi)" fill-opacity=".25"/>
  <rect x="34" y="56" width="6" height="6" rx="0.6" fill="url(#fhbi)" fill-opacity=".25"/>
  <rect x="42" y="56" width="6" height="6" rx="0.6" fill="url(#fhbi)" fill-opacity=".25"/>
  <!-- Bundle (envelope) emanating from hospital -->
  <rect x="52" y="26" width="22" height="14" rx="1.5" fill="url(#fhbi)" fill-opacity=".22" stroke="url(#fhbi)" stroke-width="1.2"/>
  <path d="M52 26L63 34L74 26" stroke="url(#fhbi)" stroke-width="1.2" opacity=".55"/>
  <!-- Three unbundled resource dots (Patient/Obs/Med) flying out -->
  <circle cx="58" cy="50" r="2.6" fill="url(#fhbi)" opacity=".55"/>
  <circle cx="65" cy="55" r="2.6" fill="url(#fhbi)" opacity=".65"/>
  <circle cx="72" cy="60" r="2.6" fill="url(#fhbi)" opacity=".75"/>
  <!-- Data flow line from hospital to bundle -->
  <path d="M48 36C52 32 54 30 56 28" stroke="url(#fhbi)" stroke-width="1" opacity=".4" stroke-dasharray="1.5 1.5"/>
  <!-- Data flow line from bundle to first resource -->
  <path d="M58 42L58 47" stroke="url(#fhbi)" stroke-width="1" opacity=".4" stroke-dasharray="1.5 1.5"/>
</svg>
