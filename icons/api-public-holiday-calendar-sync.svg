<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="phcs" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Calendar body -->
  <rect x="14" y="20" width="52" height="48" rx="4" fill="url(#phcs)" opacity=".18" stroke="url(#phcs)" stroke-width="1.6"/>
  <!-- Header bar -->
  <rect x="14" y="20" width="52" height="10" rx="4" fill="url(#phcs)" opacity=".45"/>
  <!-- Binder rings -->
  <rect x="24" y="14" width="3" height="12" rx="1.5" fill="url(#phcs)" opacity=".7"/>
  <rect x="53" y="14" width="3" height="12" rx="1.5" fill="url(#phcs)" opacity=".7"/>
  <!-- Grid lines -->
  <path d="M14 40 H66 M14 50 H66 M14 60 H66 M30 30 V68 M46 30 V68" stroke="url(#phcs)" stroke-width="0.9" opacity=".45"/>
  <!-- Loaded day cells (launch seed) -->
  <rect x="15.5" y="41" width="13.5" height="8.5" fill="url(#phcs)" opacity=".35"/>
  <rect x="31.5" y="41" width="13.5" height="8.5" fill="url(#phcs)" opacity=".35"/>
  <!-- Highlighted incremental day (next wave) — star marker -->
  <rect x="47.5" y="51" width="13.5" height="8.5" fill="url(#phcs)" opacity=".7"/>
  <path d="M54.25 52.3 L55.35 55.0 L58.2 55.2 L56.0 57.0 L56.75 59.8 L54.25 58.3 L51.75 59.8 L52.5 57.0 L50.3 55.2 L53.15 55.0 Z" fill="#ffffff" opacity=".95"/>
  <!-- Incremental sync arrow into the calendar -->
  <path d="M70 40 L66 40 M68 38 L66 40 L68 42" stroke="url(#phcs)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
