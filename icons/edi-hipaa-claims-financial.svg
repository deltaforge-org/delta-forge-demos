<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ecf" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Dollar sign circle (financial) -->
  <circle cx="40" cy="32" r="22" fill="url(#ecf)" opacity=".1"/>
  <circle cx="40" cy="32" r="22" stroke="url(#ecf)" stroke-width="1.5" fill="none"/>
  <!-- Dollar sign -->
  <text x="40" y="39" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="url(#ecf)" opacity=".7">$</text>
  <!-- Bar chart (charge/payment comparison) -->
  <rect x="18" y="60" width="10" height="14" rx="1.5" fill="url(#ecf)" opacity=".5"/>
  <rect x="31" y="56" width="10" height="18" rx="1.5" fill="url(#ecf)" opacity=".65"/>
  <rect x="44" y="62" width="10" height="12" rx="1.5" fill="url(#ecf)" opacity=".5"/>
  <rect x="57" y="58" width="10" height="16" rx="1.5" fill="url(#ecf)" opacity=".65"/>
  <!-- Medical cross accent -->
  <rect x="60" y="14" width="8" height="3" rx="1" fill="url(#ecf)" opacity=".4"/>
  <rect x="62.5" y="11.5" width="3" height="8" rx="1" fill="url(#ecf)" opacity=".4"/>
</svg>
