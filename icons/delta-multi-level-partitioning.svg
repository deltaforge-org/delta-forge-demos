  <text x="65" y="55" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D04</text>
  <!-- Label -->
  <text x="40" y="78" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#ml)" opacity=".6">MULTI-LEVEL</text>
