  <text x="17" y="39" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D01</text>
  <rect x="25" y="30" width="12" height="14" rx="2" fill="url(#ml)" opacity=".25"/>
