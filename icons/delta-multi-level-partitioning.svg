  <text x="17" y="55" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D03</text>
  <rect x="25" y="46" width="12" height="14" rx="2" fill="url(#ml)" opacity=".3"/>
  <text x="31" y="55" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D04</text>
  <!-- Leaf partitions in right column -->
  <rect x="45" y="30" width="12" height="14" rx="2" fill="url(#ml)" opacity=".3"/>
  <text x="51" y="39" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D01</text>
  <rect x="59" y="30" width="12" height="14" rx="2" fill="url(#ml)" opacity=".25"/>
  <text x="65" y="39" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D02</text>
  <rect x="45" y="46" width="12" height="14" rx="2" fill="url(#ml)" opacity=".2"/>
  <text x="51" y="55" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ml)" opacity=".6">D03</text>
