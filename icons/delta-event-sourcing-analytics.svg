<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="esa" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f87171"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <!-- Heart monitor / ECG line -->
  <polyline points="6,40 16,40 20,28 24,52 28,35 32,45 36,40 76,40" stroke="url(#esa)" stroke-width="2" fill="none" opacity=".7"/>
  <!-- Hospital cross -->
  <rect x="32" y="8" width="16" height="16" rx="2" fill="url(#esa)" fill-opacity=".15" stroke="url(#esa)" stroke-width="1.5"/>
  <line x1="40" y1="11" x2="40" y2="21" stroke="url(#esa)" stroke-width="2"/>
  <line x1="35" y1="16" x2="45" y2="16" stroke="url(#esa)" stroke-width="2"/>
  <!-- Patient flow arrows: triage → admit → transfer → discharge -->
  <circle cx="14" cy="62" r="5" stroke="url(#esa)" stroke-width="1.5" fill="url(#esa)" fill-opacity=".2"/>
  <text x="14" y="64" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#esa)">T</text>
  <line x1="20" y1="62" x2="27" y2="62" stroke="url(#esa)" stroke-width="1" marker-end="none" opacity=".6"/>
  <circle cx="33" cy="62" r="5" stroke="url(#esa)" stroke-width="1.5" fill="url(#esa)" fill-opacity=".2"/>
  <text x="33" y="64" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#esa)">A</text>
  <line x1="39" y1="62" x2="46" y2="62" stroke="url(#esa)" stroke-width="1" opacity=".6"/>
  <circle cx="52" cy="62" r="5" stroke="url(#esa)" stroke-width="1.5" fill="url(#esa)" fill-opacity=".2"/>
  <text x="52" y="64" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#esa)">X</text>
  <line x1="58" y1="62" x2="65" y2="62" stroke="url(#esa)" stroke-width="1" opacity=".6"/>
  <circle cx="71" cy="62" r="5" stroke="url(#esa)" stroke-width="1.5" fill="url(#esa)" fill-opacity=".2"/>
  <text x="71" y="64" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#esa)">D</text>
</svg>
