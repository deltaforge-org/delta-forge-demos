<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="jel" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Credit card outline -->
  <rect x="10" y="16" width="40" height="28" rx="4" stroke="url(#jel)" stroke-width="2" fill="url(#jel)" fill-opacity=".1"/>
  <line x1="10" y1="24" x2="50" y2="24" stroke="url(#jel)" stroke-width="1.5" opacity=".6"/>
  <rect x="14" y="28" width="12" height="4" rx="1" fill="url(#jel)" opacity=".4"/>
  <!-- JSON braces -->
  <text x="52" y="30" font-size="18" font-family="monospace" fill="url(#jel)" opacity=".5">{</text>
  <text x="66" y="30" font-size="18" font-family="monospace" fill="url(#jel)" opacity=".5">}</text>
  <!-- Event stream arrows -->
  <path d="M20 52L20 68" stroke="url(#jel)" stroke-width="1.5" opacity=".5"/>
  <path d="M35 52L35 68" stroke="url(#jel)" stroke-width="1.5" opacity=".5"/>
  <path d="M50 52L50 68" stroke="url(#jel)" stroke-width="1.5" opacity=".5"/>
  <path d="M65 52L65 68" stroke="url(#jel)" stroke-width="1.5" opacity=".5"/>
  <circle cx="20" cy="56" r="3" fill="url(#jel)" opacity=".8"/>
  <circle cx="35" cy="60" r="3" fill="url(#jel)" opacity=".6"/>
  <circle cx="50" cy="54" r="3" fill="url(#jel)" opacity=".7"/>
  <circle cx="65" cy="62" r="3" fill="url(#jel)" opacity=".5"/>
  <!-- Label -->
  <rect x="16" y="70" width="48" height="8" rx="4" fill="url(#jel)" fill-opacity=".15" stroke="url(#jel)" stroke-width=".5"/>
  <text x="40" y="76" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#jel)" opacity=".8">EVENT LOG</text>
</svg>
