<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="tp" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Gear / settings icon -->
  <circle cx="40" cy="30" r="12" stroke="url(#tp)" stroke-width="1.5" fill="url(#tp)" fill-opacity=".1"/>
  <circle cx="40" cy="30" r="5" stroke="url(#tp)" stroke-width="1.5" fill="url(#tp)" fill-opacity=".2"/>
  <!-- Gear teeth -->
  <line x1="40" y1="16" x2="40" y2="20" stroke="url(#tp)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="40" x2="40" y2="44" stroke="url(#tp)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="30" x2="30" y2="30" stroke="url(#tp)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="54" y2="30" stroke="url(#tp)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30.1" y1="20.1" x2="32.9" y2="22.9" stroke="url(#tp)" stroke-width="2" stroke-linecap="round"/>
  <line x1="47.1" y1="37.1" x2="49.9" y2="39.9" stroke="url(#tp)" stroke-width="2" stroke-linecap="round"/>
  <line x1="49.9" y1="20.1" x2="47.1" y2="22.9" stroke="url(#tp)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32.9" y1="37.1" x2="30.1" y2="39.9" stroke="url(#tp)" stroke-width="2" stroke-linecap="round"/>
  <!-- Property key-value lines -->
  <rect x="14" y="52" width="52" height="6" rx="1.5" fill="url(#tp)" fill-opacity=".15" stroke="url(#tp)" stroke-width=".8"/>
  <text x="18" y="57" font-size="4" font-family="monospace" fill="url(#tp)" opacity=".7">key = value</text>
  <rect x="14" y="60" width="52" height="6" rx="1.5" fill="url(#tp)" fill-opacity=".1" stroke="url(#tp)" stroke-width=".8"/>
  <text x="18" y="65" font-size="4" font-family="monospace" fill="url(#tp)" opacity=".6">key = value</text>
  <rect x="14" y="68" width="52" height="6" rx="1.5" fill="url(#tp)" fill-opacity=".08" stroke="url(#tp)" stroke-width=".8"/>
  <text x="18" y="73" font-size="4" font-family="monospace" fill="url(#tp)" opacity=".5">key = value</text>
</svg>
