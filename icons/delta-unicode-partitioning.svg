<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="up" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Partition folders -->
  <rect x="6" y="10" width="30" height="18" rx="3" stroke="url(#up)" stroke-width="1.5" fill="url(#up)" fill-opacity=".1"/>
  <text x="21" y="22" text-anchor="middle" font-size="7" font-family="serif" fill="url(#up)" opacity=".9">日本語</text>
  <rect x="44" y="10" width="30" height="18" rx="3" stroke="url(#up)" stroke-width="1.5" fill="url(#up)" fill-opacity=".1"/>
  <text x="59" y="22" text-anchor="middle" font-size="6" font-family="serif" fill="url(#up)" opacity=".9">العربية</text>
  <rect x="6" y="34" width="30" height="18" rx="3" stroke="url(#up)" stroke-width="1.5" fill="url(#up)" fill-opacity=".1"/>
  <text x="21" y="46" text-anchor="middle" font-size="6" font-family="serif" fill="url(#up)" opacity=".9">Русский</text>
  <rect x="44" y="34" width="30" height="18" rx="3" stroke="url(#up)" stroke-width="1.5" fill="url(#up)" fill-opacity=".1"/>
  <text x="59" y="46" text-anchor="middle" font-size="5.5" font-family="serif" fill="url(#up)" opacity=".9">Français</text>
  <!-- Fifth partition centered below -->
  <rect x="25" y="58" width="30" height="18" rx="3" stroke="url(#up)" stroke-width="1.5" fill="url(#up)" fill-opacity=".15"/>
  <text x="40" y="70" text-anchor="middle" font-size="5" font-family="serif" fill="url(#up)" opacity=".9">Português</text>
</svg>
