<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ihp" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#facc15"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Car body -->
  <rect x="16" y="32" width="48" height="16" rx="4" fill="url(#ihp)" fill-opacity=".18" stroke="url(#ihp)" stroke-width="1.5"/>
  <!-- Car roof -->
  <path d="M26 32L30 20H50L54 32" fill="url(#ihp)" fill-opacity=".12" stroke="url(#ihp)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Windshield -->
  <path d="M32 31L34 23H46L48 31" stroke="url(#ihp)" stroke-width="1" opacity=".5" fill="none" stroke-linejoin="round"/>
  <!-- Taxi light on roof -->
  <rect x="36" y="16" width="8" height="4" rx="2" fill="url(#ihp)" fill-opacity=".35" stroke="url(#ihp)" stroke-width="1"/>
  <!-- Front wheel -->
  <circle cx="28" cy="50" r="5" fill="url(#ihp)" fill-opacity=".15" stroke="url(#ihp)" stroke-width="1.5"/>
  <circle cx="28" cy="50" r="2" fill="url(#ihp)" fill-opacity=".3"/>
  <!-- Rear wheel -->
  <circle cx="52" cy="50" r="5" fill="url(#ihp)" fill-opacity=".15" stroke="url(#ihp)" stroke-width="1.5"/>
  <circle cx="52" cy="50" r="2" fill="url(#ihp)" fill-opacity=".3"/>
  <!-- Headlight -->
  <rect x="62" y="36" width="4" height="3" rx="1" fill="url(#ihp)" fill-opacity=".5"/>
  <!-- Taillight -->
  <rect x="14" y="36" width="3" height="3" rx="1" fill="url(#ihp)" fill-opacity=".4"/>
  <!-- Road line (dashed) -->
  <path d="M8 58H72" stroke="url(#ihp)" stroke-width="1" opacity=".3" stroke-dasharray="4 3"/>
  <!-- Label -->
  <text x="40" y="72" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#ihp)" opacity=".6">ICEBERG</text>
</svg>
