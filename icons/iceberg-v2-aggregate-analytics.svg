<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="iaa" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16a34a"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Shopping bag -->
  <rect x="18" y="30" width="44" height="38" rx="4" fill="url(#iaa)" opacity=".2" stroke="url(#iaa)" stroke-width="1.5"/>
  <!-- Bag handles -->
  <path d="M30 30 L30 22 Q30 16 40 16 Q50 16 50 22 L50 30" fill="none" stroke="url(#iaa)" stroke-width="1.5"/>
  <!-- OLAP cube faces (multi-dimensional aggregation) -->
  <rect x="26" y="40" width="12" height="12" rx="1" fill="url(#iaa)" opacity=".5"/>
  <rect x="42" y="40" width="12" height="12" rx="1" fill="url(#iaa)" opacity=".4"/>
  <rect x="34" y="54" width="12" height="12" rx="1" fill="url(#iaa)" opacity=".3"/>
  <!-- Connecting lines (grouping sets) -->
  <line x1="38" y1="46" x2="42" y2="46" stroke="url(#iaa)" stroke-width="1" opacity=".6"/>
  <line x1="35" y1="52" x2="38" y2="54" stroke="url(#iaa)" stroke-width="1" opacity=".6"/>
  <line x1="48" y1="52" x2="45" y2="54" stroke="url(#iaa)" stroke-width="1" opacity=".6"/>
</svg>
