<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="prd" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Three month partitions -->
  <rect x="6" y="12" width="20" height="32" rx="3" stroke="url(#prd)" stroke-width="1.5" fill="url(#prd)" fill-opacity=".12"/>
  <rect x="30" y="12" width="20" height="32" rx="3" stroke="url(#prd)" stroke-width="1.5" fill="url(#prd)" fill-opacity=".12"/>
  <rect x="54" y="12" width="20" height="32" rx="3" stroke="url(#prd)" stroke-width="1.5" fill="url(#prd)" fill-opacity=".12"/>
  <!-- Month labels -->
  <text x="16" y="20" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#prd)" opacity=".6">JAN</text>
  <text x="40" y="20" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#prd)" opacity=".6">FEB</text>
  <text x="64" y="20" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#prd)" opacity=".6">MAR</text>
  <!-- Jan partition: X marks (being replaced) -->
  <rect x="9" y="24" width="14" height="4" rx="1" fill="url(#prd)" opacity=".2"/>
  <line x1="10" y1="24" x2="22" y2="28" stroke="url(#prd)" stroke-width="1" opacity=".6"/>
  <line x1="22" y1="24" x2="10" y2="28" stroke="url(#prd)" stroke-width="1" opacity=".6"/>
  <rect x="9" y="30" width="14" height="4" rx="1" fill="url(#prd)" opacity=".2"/>
  <line x1="10" y1="30" x2="22" y2="34" stroke="url(#prd)" stroke-width="1" opacity=".6"/>
  <line x1="22" y1="30" x2="10" y2="34" stroke="url(#prd)" stroke-width="1" opacity=".6"/>
  <!-- Feb/Mar partitions: normal data -->
  <rect x="33" y="24" width="14" height="4" rx="1" fill="url(#prd)" opacity=".35"/>
  <rect x="33" y="30" width="14" height="4" rx="1" fill="url(#prd)" opacity=".35"/>
  <rect x="33" y="36" width="14" height="4" rx="1" fill="url(#prd)" opacity=".35"/>
  <rect x="57" y="24" width="14" height="4" rx="1" fill="url(#prd)" opacity=".35"/>
  <rect x="57" y="30" width="14" height="4" rx="1" fill="url(#prd)" opacity=".35"/>
  <rect x="57" y="36" width="14" height="4" rx="1" fill="url(#prd)" opacity=".35"/>
  <!-- Replacement arrow curving down to Jan -->
  <path d="M16 48L16 55" stroke="url(#prd)" stroke-width="2" stroke-linecap="round"/>
  <path d="M12 52L16 56L20 52" stroke="url(#prd)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- New corrected data block -->
  <rect x="9" y="58" width="14" height="6" rx="2" fill="url(#prd)" opacity=".5"/>
  <path d="M12 62L15 64L21 59" stroke="#fff" stroke-width="1" fill="none" opacity=".8"/>
  <!-- Label -->
  <text x="40" y="74" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#prd)" opacity=".6">REPLACE</text>
</svg>
