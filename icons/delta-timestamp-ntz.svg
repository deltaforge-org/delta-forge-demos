<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="tn" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Hospital cross -->
  <rect x="27" y="12" width="10" height="26" rx="2" fill="url(#tn)" fill-opacity=".15" stroke="url(#tn)" stroke-width="1.5"/>
  <rect x="19" y="20" width="26" height="10" rx="2" fill="url(#tn)" fill-opacity=".15" stroke="url(#tn)" stroke-width="1.5"/>
  <!-- Clock face -->
  <circle cx="55" cy="25" r="12" stroke="url(#tn)" stroke-width="1.5" fill="url(#tn)" fill-opacity=".06"/>
  <line x1="55" y1="25" x2="55" y2="17" stroke="url(#tn)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="25" x2="61" y2="22" stroke="url(#tn)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="55" cy="25" r="1.5" fill="url(#tn)"/>
  <!-- NTZ badge -->
  <rect x="46" y="38" width="22" height="10" rx="3" fill="url(#tn)" fill-opacity=".12" stroke="url(#tn)" stroke-width="1"/>
  <text x="57" y="46" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#tn)" font-weight="bold">NTZ</text>
  <!-- Shift timeline bars -->
  <rect x="8" y="56" width="18" height="5" rx="1.5" fill="url(#tn)" fill-opacity=".5"/>
  <rect x="28" y="56" width="18" height="5" rx="1.5" fill="url(#tn)" fill-opacity=".35"/>
  <rect x="48" y="56" width="18" height="5" rx="1.5" fill="url(#tn)" fill-opacity=".2"/>
  <text x="17" y="71" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#tn)" opacity=".6">DAY</text>
  <text x="37" y="71" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#tn)" opacity=".6">EVE</text>
  <text x="57" y="71" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#tn)" opacity=".6">NGT</text>
</svg>
