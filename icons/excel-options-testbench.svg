<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ot" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
  <!-- Spreadsheet frame -->
  <rect x="8" y="8" width="64" height="64" rx="4" stroke="url(#ot)" stroke-width="1.5" fill="url(#ot)" fill-opacity=".05"/>
  <!-- Header row -->
  <rect x="8" y="8" width="64" height="12" rx="4" fill="url(#ot)" opacity=".1"/>
  <!-- 5 option rows with check/cross indicators -->
  <!-- Row 1 - checkmark -->
  <line x1="12" y1="30" x2="68" y2="30" stroke="url(#ot)" stroke-width=".4" opacity=".15"/>
  <circle cx="16" cy="26" r="3.5" stroke="url(#ot)" stroke-width="1.2" fill="none"/>
  <polyline points="13.5,26 15.2,28 18.5,24" stroke="url(#ot)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Row 2 - checkmark -->
  <line x1="12" y1="42" x2="68" y2="42" stroke="url(#ot)" stroke-width=".4" opacity=".15"/>
  <circle cx="16" cy="36" r="3.5" stroke="url(#ot)" stroke-width="1.2" fill="none"/>
  <polyline points="13.5,36 15.2,38 18.5,34" stroke="url(#ot)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Row 3 - checkmark -->
  <line x1="12" y1="54" x2="68" y2="54" stroke="url(#ot)" stroke-width=".4" opacity=".15"/>
  <circle cx="16" cy="48" r="3.5" stroke="url(#ot)" stroke-width="1.2" fill="none"/>
  <polyline points="13.5,48 15.2,50 18.5,46" stroke="url(#ot)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Row 4 - checkmark -->
  <line x1="12" y1="66" x2="68" y2="66" stroke="url(#ot)" stroke-width=".4" opacity=".15"/>
  <circle cx="16" cy="60" r="3.5" stroke="url(#ot)" stroke-width="1.2" fill="none"/>
  <polyline points="13.5,60 15.2,62 18.5,58" stroke="url(#ot)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Option labels (abstract bars) -->
  <rect x="24" y="24" width="20" height="4" rx="1" fill="url(#ot)" opacity=".4"/>
  <rect x="24" y="34" width="16" height="4" rx="1" fill="url(#ot)" opacity=".35"/>
  <rect x="24" y="46" width="22" height="4" rx="1" fill="url(#ot)" opacity=".3"/>
  <rect x="24" y="58" width="18" height="4" rx="1" fill="url(#ot)" opacity=".25"/>
  <!-- Status badges -->
  <rect x="52" y="24" width="14" height="4" rx="2" fill="url(#ot)" opacity=".5"/>
  <rect x="52" y="34" width="14" height="4" rx="2" fill="url(#ot)" opacity=".5"/>
  <rect x="52" y="46" width="14" height="4" rx="2" fill="url(#ot)" opacity=".5"/>
  <rect x="52" y="58" width="14" height="4" rx="2" fill="url(#ot)" opacity=".5"/>
</svg>
