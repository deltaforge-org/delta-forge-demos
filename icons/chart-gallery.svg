<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="cg" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb923c"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Dashboard card -->
  <rect x="6" y="10" width="68" height="60" rx="5" fill="url(#cg)" opacity=".12" stroke="url(#cg)" stroke-width="1.5"/>
  <!-- Axis -->
  <line x1="14" y1="56" x2="50" y2="56" stroke="url(#cg)" stroke-width="1.2" opacity=".55"/>
  <line x1="14" y1="20" x2="14" y2="56" stroke="url(#cg)" stroke-width="1.2" opacity=".55"/>
  <!-- Bars (BAR chart) -->
  <rect x="17" y="42" width="5" height="14" rx="1" fill="url(#cg)" opacity=".55"/>
  <rect x="24" y="34" width="5" height="22" rx="1" fill="url(#cg)" opacity=".7"/>
  <rect x="31" y="28" width="5" height="28" rx="1" fill="url(#cg)" opacity=".85"/>
  <rect x="38" y="38" width="5" height="18" rx="1" fill="url(#cg)" opacity=".65"/>
  <!-- Line chart polyline overlay -->
  <polyline points="17,36 24,30 31,22 38,26 45,18" fill="none" stroke="url(#cg)" stroke-width="1.8" opacity=".95"/>
  <circle cx="17" cy="36" r="1.6" fill="url(#cg)"/>
  <circle cx="24" cy="30" r="1.6" fill="url(#cg)"/>
  <circle cx="31" cy="22" r="1.6" fill="url(#cg)"/>
  <circle cx="38" cy="26" r="1.6" fill="url(#cg)"/>
  <circle cx="45" cy="18" r="1.6" fill="url(#cg)"/>
  <!-- Pie chart at right (quarter-highlighted) -->
  <circle cx="60" cy="36" r="11" fill="url(#cg)" opacity=".22" stroke="url(#cg)" stroke-width="1.3"/>
  <path d="M 60 36 L 60 25 A 11 11 0 0 1 70.3 39.5 Z" fill="url(#cg)" opacity=".75"/>
  <path d="M 60 36 L 70.3 39.5 A 11 11 0 0 1 57.4 46.9 Z" fill="url(#cg)" opacity=".4"/>
  <!-- Candlestick motifs near bottom -->
  <line x1="56" y1="54" x2="56" y2="64" stroke="url(#cg)" stroke-width="1" opacity=".7"/>
  <rect x="54.5" y="57" width="3" height="5" fill="url(#cg)" opacity=".75"/>
  <line x1="62" y1="52" x2="62" y2="62" stroke="url(#cg)" stroke-width="1" opacity=".7"/>
  <rect x="60.5" y="54" width="3" height="5" fill="url(#cg)" opacity=".55"/>
  <line x1="68" y1="55" x2="68" y2="65" stroke="url(#cg)" stroke-width="1" opacity=".7"/>
  <rect x="66.5" y="58" width="3" height="5" fill="url(#cg)" opacity=".75"/>
</svg>
