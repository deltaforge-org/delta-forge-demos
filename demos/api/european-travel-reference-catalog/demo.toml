[demo]
id = "api-european-travel-reference-catalog"
name = "European Travel Reference Catalog"
version = "1.0.0"
description = """
End-to-end REST API ingest demo: a travel-tech startup keeps its European
country reference data fresh by syncing from the public REST Countries API.
Walks the full Phase 1 path — credential stored in OS keychain, REST API
data source bound to a bronze zone, API endpoint definition, INVOKE
to download raw JSON, then a flattened external table that the localization
+ compliance teams can query directly.

Demonstrates: CREATE CREDENTIAL STORAGE (OS keychain), CREATE CREDENTIAL
with vault-stored secret, CREATE CONNECTION TYPE = rest_api, CREATE API
ENDPOINT with a 3-part qualified name, INVOKE API ENDPOINT (live HTTP fetch),
and CREATE EXTERNAL TABLE USING JSON with json_flatten_config to project
the nested response into a flat queryable shape.

NOTE: requires internet. INVOKE issues a real GET against
https://restcountries.com/v3.1/region/europe.
"""
categories = ["api", "rest-ingest"]
tags = ["api", "rest", "ingest", "credentials", "keychain", "json", "flatten", "external-table"]
difficulty = "advanced"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Reserved by the harness; this demo downloads its data via INVOKE rather than reading shipped files. The external-table LOCATION is resolved relative to the bronze zone's storage root.", required = false }
zone_name = { description = "Target zone for the bronze landing path. Defaults to `bronze`.", required = false }

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.travel_geo.european_countries"
