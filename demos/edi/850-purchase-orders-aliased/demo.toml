[demo]
id = "edi-850-purchase-orders-aliased"
name = "Wholesale Distributor PO Inbox — Aliased Columns + JSON Line Items"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Wholesale-distributor purchase-order inbox built on the just-landed EDI \
engine wiring. A wholesale distributor receives X12 850 Purchase Orders \
from a dozen retail trading partners; this demo proves two features that \
make the bronze ingest analyst-ready without falling back to df_transaction_json:\

(1) `aliasFormat = 'friendly_column'` rewrites materialized columns from \
opaque numeric names (`beg_2`, `po1_7`) to human-readable identifiers \
(`purchaseordernumber_beg_2`, `productserviceidqualifier_po1_7`) using the \
per-segment X12 V5010 element catalog. The numeric suffix is preserved so \
the schema stays addressable even when the friendly prefix sits one slot \
off vs the X12 BEG01/BEG02 numbering.

(2) `repeating_segment_mode = 'to_json'` collapses every PO1 line-item \
segment (and every N1 party loop) into a JSON-array value per element \
column. Analysts use `json_array_length(productserviceidqualifier_po1_7)` \
to count line items per PO and `json_extract` to walk individual SKUs — \
no df_transaction_json parsing required.

Four synthetic 850 transactions (3-6 line items each, 18 total) drive 7 \
queries with 40+ ASSERTs that exercise both features in isolation and \
together (combined header-from-aliased-columns + line-count-from-JSON \
query, plus a 6-check VERIFY block).
"""
categories = ["edi", "commerce"]
tags = [
    "edi",
    "x12",
    "850",
    "purchase-order",
    "alias",
    "to-json",
    "loops",
    "json-array",
    "intermediate",
]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the directory containing X12 850 EDI files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/po_acme_001.edi"
format = "edi"
description = "X12 850 — Acme Retail Stores Inc PO PO-ACME-44521 (4 PO1 line items, original order)"
size_bytes = 545

[[demo.data_files]]
path = "data/po_bigbox_002.edi"
format = "edi"
description = "X12 850 — BigBoxMart Procurement PO BBM-2026-99812 (6 PO1 line items, stand-alone order)"
size_bytes = 639

[[demo.data_files]]
path = "data/po_cornerco_003.edi"
format = "edi"
description = "X12 850 — Corner Co-op Markets PO CC-77-3041 (3 PO1 line items, purpose 01 cancellation)"
size_bytes = 516

[[demo.data_files]]
path = "data/po_dynamart_004.edi"
format = "edi"
description = "X12 850 — DynaMart Stores PO DYN-RETAIL-505012 (5 PO1 line items, original order)"
size_bytes = 611

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.commerce.purchase_orders"
