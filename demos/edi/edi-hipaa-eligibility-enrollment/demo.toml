[demo]
id = "edi-hipaa-eligibility-enrollment"
name = "EDI HIPAA Eligibility & Enrollment — Coverage Verification"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates HIPAA eligibility verification and benefit enrollment \
analysis using CTEs, JOINs, and COALESCE — SQL patterns not found in \
any other EDI demo. Three transactions cover the eligibility \
request/response cycle (270/271) and benefit enrollment maintenance \
(834). Two specialized tables extract eligibility fields (BHT purpose, \
NM1 entities, TRN trace numbers, EQ service type, DMG demographics) \
and enrollment fields (BGN transaction, INS subscriber, HD health \
plan elections, COB coordination of benefits). A CTE pairs the 270 \
request with its 271 response by matching TRN trace numbers, and a \
JOIN correlates eligibility context with enrollment plan data.
"""
categories = ["edi", "healthcare", "hipaa"]
tags = ["edi", "x12", "hipaa", "healthcare", "eligibility", "enrollment", "cte", "join", "coalesce", "coverage"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing HIPAA X12 eligibility and enrollment files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/hipaa_270_eligibility_request.edi"
format = "edi"
description = "270 — Eligibility inquiry (GS=HC, guide=005010X279A1): BHT/NM1/TRN/EQ/DMG segments for patient eligibility check"
size_bytes = 503

[[demo.data_files]]
path = "data/hipaa_271_eligibility_response.edi"
format = "edi"
description = "271 — Eligibility response (GS=HC, guide=005010X279A1): BHT/NM1/TRN/EB segments with coverage and benefit details"
size_bytes = 805

[[demo.data_files]]
path = "data/hipaa_834_benefit_enrollment.edi"
format = "edi"
description = "834 — Benefit enrollment (GS=BE, guide=005010X220A1): BGN/INS/NM1/HD/COB member enrollment with 3 plan elections (HLT, DEN, VIS)"
size_bytes = 678

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.eligibility_messages"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.enrollment_details"
