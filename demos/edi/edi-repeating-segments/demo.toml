[demo]
id = "edi-repeating-segments"
name = "EDI Repeating Segments — Multi-Occurrence X12 Handling"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates Delta Forge's repeating_segment_mode EDI option for handling \
X12 transactions with multiple occurrences of the same segment type. \
Real-world EDI documents routinely contain repeating segments — purchase \
orders with multiple line items (PO1), multiple ship-to/bill-to addresses \
(N1), and multiple reference numbers (REF). The default "First" mode keeps \
only the first occurrence, but Indexed, Concatenate, and ToJson modes \
capture every occurrence as queryable columns. Three tables demonstrate \
each mode side-by-side on the same 14-file X12 feed: Indexed produces \
numbered columns (n1_1_2, n1_2_2, n1_3_2), Concatenate joins values with \
a pipe delimiter, and ToJson emits JSON arrays — letting analysts choose \
the right trade-off between column granularity and schema simplicity.
"""
categories = ["edi", "supply-chain"]
tags = ["edi", "x12", "repeating-segments", "indexed", "concatenate", "multi-occurrence", "advanced"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to the directory containing X12 EDI transaction files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/x12_850_purchase_order.edi"
format = "edi"
description = "850 Purchase Order — Simple PO (000123456, v00401): 1 line item, ship-to John Doe, UPS Ground"
size_bytes = 389

