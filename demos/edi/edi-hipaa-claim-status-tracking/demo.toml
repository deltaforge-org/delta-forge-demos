[demo]
id = "edi-hipaa-claim-status-tracking"
name = "EDI HIPAA Claim Status — Inquiry & Authorization Tracking"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates HIPAA claim status tracking and prior authorization \
review using CASE expressions on composite status codes, LIKE pattern \
matching, and multi-table JOINs — SQL patterns unique across all EDI \
demos. Three transactions cover the claim status request/response \
cycle (276/277) and health services review for prior authorization \
(278). Two specialized tables extract status-tracking fields (BHT \
purpose, TRN trace numbers, STC status codes, AMT claim amounts) and \
detail fields (SVC service lines, UM utilization management, HI \
diagnosis codes, REF references). Queries classify composite STC \
codes (P3:317 = pending, F0:3 = finalized) using LIKE patterns and \
correlate request amounts with response statuses.
"""
categories = ["edi", "healthcare", "hipaa"]
tags = ["edi", "x12", "hipaa", "healthcare", "claim-status", "authorization", "like", "join", "status-codes"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing HIPAA X12 claim status and authorization files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/hipaa_276_claim_status_request.edi"
format = "edi"
description = "276 — Claim status request (GS=HC, guide=005010X212): 3 patient inquiries with AMT/DTP/TRN/REF segments"
size_bytes = 975

[[demo.data_files]]
path = "data/hipaa_277_claim_status_response.edi"
format = "edi"
description = "277 — Claim status response (GS=HC, guide=005010X212): 3 patient responses with STC status codes and SVC service detail"
size_bytes = 1064

[[demo.data_files]]
path = "data/hipaa_278_services_review.edi"
format = "edi"
description = "278 — Health services review / prior authorization (GS=HC, guide=005010X217): UM utilization management + HI diagnosis codes"
size_bytes = 590

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.status_messages"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.status_details"
