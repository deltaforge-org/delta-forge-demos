[demo]
id = "edi-json-segment-extraction"
name = "EDI JSON Segment Extraction — On-Demand X12 Deep Access"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates SQL JSON functions for on-demand exploration and extraction of \
X12 EDI transaction segments — without pre-materializing fields. Rather than \
configuring materialized_paths up front, analysts use json_array_length, \
json_typeof, json_extract_path_text, jsonb_pretty, and the #>> path operator \
to inspect transaction structure and extract specific segment values on the \
fly. This approach is ideal for EDI integration teams that receive hundreds \
of heterogeneous X12 transactions daily and need flexible, ad-hoc access to \
any segment or element within the full transaction JSON.
"""
categories = ["edi", "json"]
tags = ["edi", "x12", "json", "json-functions", "segment-extraction", "on-demand", "advanced"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to X12 EDI transaction files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/x12_850_purchase_order.edi"
format = "edi"
description = "850 Purchase Order — Simple PO (000123456, v00401): 1 line item, ship-to John Doe, UPS Ground"
size_bytes = 389

