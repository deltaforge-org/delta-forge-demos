[demo]
id = "edi-compliance-validation"
name = "EDI Compliance Validation — 997/824 Error & Rejection Analysis"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates EDI compliance monitoring using 997 (Functional Acknowledgment) \
and 824 (Application Advice) transactions — the two X12 document types that \
trading partners exchange to report acceptance, rejection, and error details. \
Most EDI demos treat 997/824 as just another row in a header overview; this \
demo digs into the acknowledgment-specific segments (AK1-AK9 for 997, \
OTI/TED/BGN for 824) to show how EDI operations teams monitor compliance \
rates, diagnose rejected transactions, and decode error codes. Two tables \
demonstrate different access patterns: a compact messages table for \
classification and counts, and a materialized details table with 997/824 \
error-reporting segments extracted as first-class columns. Queries cover \
compliance vs business document classification, functional group rejection \
analysis, segment-level error diagnosis, application advice error \
descriptions, and automated verification checks.
"""
categories = ["edi", "compliance"]
tags = ["edi", "x12", "compliance", "997", "824", "functional-acknowledgment", "error-analysis", "rejection", "advanced"]
difficulty = "advanced"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing X12 EDI transaction files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/x12_850_purchase_order.edi"
format = "edi"
description = "850 Purchase Order — Simple PO (000123456, v00401): 1 line item, ship-to John Doe, UPS Ground"
size_bytes = 389

