[demo]
id = "edi-hipaa-claims-financial"
name = "EDI HIPAA Claims Financial — Charge & Remittance Analysis"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates financial analysis of HIPAA X12 healthcare claims using SQL \
aggregate functions, CAST expressions, and HAVING clauses — features not \
covered by any other EDI demo. Four transactions cover three claim types \
(837 professional, dental, institutional) and one remittance advice (835). \
Two specialized tables extract claim-level charges (CLM, SV1/SV2/SV3 \
service lines) and remittance details (BPR payment, CLP claim-level \
payment, CAS adjustments) as first-class columns. Queries compute total \
charges with SUM, filter high-value claims with HAVING, calculate \
write-off percentages with CAST and arithmetic, and JOIN both tables for \
end-to-end charge-to-payment reconciliation.
"""
categories = ["edi", "healthcare", "hipaa"]
tags = ["edi", "x12", "hipaa", "healthcare", "claims", "financial", "remittance", "sum", "cast", "having", "join"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing HIPAA X12 claim and remittance files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/hipaa_835_claim_payment.edi"
format = "edi"
description = "837 — Healthcare claim professional (GS=HC, guide=005010X222A1): CLM + 4 SV1 service lines"
size_bytes = 1151

[[demo.data_files]]
path = "data/hipaa_837D_dental_claim.edi"
format = "edi"
description = "837 — Healthcare claim dental (GS=HC, guide=005010X224A2): CLM + 2 SV3 dental service lines with tooth numbers"
size_bytes = 925

[[demo.data_files]]
path = "data/hipaa_837I_institutional_claim.edi"
format = "edi"
description = "837 — Healthcare claim institutional (GS=HC, guide=005010X223A2): CLM + 2 SV2 institutional service lines with revenue codes"
size_bytes = 1259

[[demo.data_files]]
path = "data/hipaa_820_payment.edi"
format = "edi"
description = "835 — Claim payment/remittance advice (GS=HC, guide=005010X221A1): BPR payment + CLP claim-level detail + CAS adjustments + SVC service payment"
size_bytes = 800

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.claims_header"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.claims_remittance"
