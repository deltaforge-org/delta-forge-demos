[demo]
id = "delta-restore-vacuum-lifecycle"
name = "Delta RESTORE + VACUUM — Incident Response Lifecycle"
version = "1.0.0"
author = "DeltaForge Team"
description = """
A cold-storage facility monitors temperature sensors across three rooms. When a \
faulty sensor batch injects false alert readings, the team uses RESTORE TO VERSION \
to roll back to the last known-good state, then VACUUM to permanently remove the \
orphaned files from the bad import. This demo walks through the full incident \
response lifecycle: detect the problem, restore to a safe version, vacuum orphaned \
data, verify integrity, and resume normal operations.
"""
categories = ["delta-table", "delta-versioning"]
tags = ["delta-table", "advanced", "restore", "vacuum", "recovery", "lifecycle", "iot", "monitoring"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.restore_sensor_readings"
