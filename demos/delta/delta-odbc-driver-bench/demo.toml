[demo]
id = "delta-odbc-driver-bench"
name = "ODBC Driver Wire Benchmark Suite"
version = "1.0.0"
author = "DeltaForge Team"
description = """
The DeltaForge driver-engineering team needs a deterministic, regression-safe \
corpus that isolates one ODBC wire dimension at a time so that when a build \
regresses on byte counts or throughput, the responsible code path is obvious. \
This suite seeds ten Delta tables totalling ~3.27M rows, scaled to stay safely \
under Arrow's 2GB i32 string-offset limit: a 1M-row fixed-narrow speed-of-light \
baseline (8 cols, INT64/DOUBLE, no nulls), a 100K-row 60-column fixed-wide \
table for per-cell overhead and column slab cache, 500K-row and 100K-row \
UTF-8 string tables (30% NULL and 5% NULL respectively) for decode and \
indicator-array hot paths, a 10K-row 6.4KB-per-cell long-string table that \
exercises SQLGetData chunked reads, a 5K-row BINARY blob table with 32B-32KB \
cells that stresses SQL_C_BINARY chunked truncation, a 500K-row decimal_temporal \
table covering DECIMAL(38,9), DATE, TIMESTAMP, and TIME formatting paths, a \
50K-row deeply-nested table with STRUCT, ARRAY, and MAP for the format-bound \
path, a 500K-row 30-column 95%-NULL fact-table simulator for the indicator-only \
fast path, and a 500K-row skewed strings table whose one column mixes 99% short \
with 1% 100KB cells to stress the chunked-read offset machinery under realistic \
skew. Every value is row_number-derived so two runs are bit-identical and any \
byte-count regression is real, not noise. A standalone scale-up script, \
extras/huge_fixed_narrow_200m.sql, creates a separate 200M-row table for \
load-testing the writer and ODBC throughput at memcpy speed-of-light.
"""
categories = ["delta-table", "benchmark", "odbc"]
tags = [
    "delta-table",
    "advanced",
    "benchmark",
    "odbc",
    "wire-format",
    "regression-suite",
    "deterministic",
    "fixed-width",
    "string-decode",
    "binary-blobs",
    "decimal",
    "temporal",
    "nested-types",
    "variant",
    "null-density",
    "skewed-data",
    "large-rows"
]
difficulty = "advanced"
estimated_time_minutes = 60

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'bench_zone')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.fixed_narrow"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.fixed_wide"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.string_narrow"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.string_wide_kv"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.string_long"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.binary_blobs"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.decimal_temporal"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.nested_json"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.null_heavy"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.bench.skewed_strings"
