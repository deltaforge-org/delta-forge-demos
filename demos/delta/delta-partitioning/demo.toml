[demo]
id = "delta-partitioning"
name = "Delta Partitioning — Organize & Query by Region"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Delta table partitioning physically organizes data files into directories \
by partition column values, enabling partition pruning that skips entire \
file groups during queries. This dramatically reduces I/O for filtered \
queries on high-cardinality datasets. This demo partitions an orders \
table by region and demonstrates how UPDATE and DELETE operations are \
scoped to specific partitions at the file level.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "partitioning", "partitioned-by", "region", "analytics"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.partitioned_orders"
