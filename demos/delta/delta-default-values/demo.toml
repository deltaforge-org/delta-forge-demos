[demo]
id = "delta-default-values"
name = "Delta Column Default Values"
version = "1.0.0"
author = "Delta Forge Team"
description = """
NULLs in analytics pipelines silently corrupt COUNT, SUM, and GROUP BY \
results. This demo first shows the damage — inserting rows without defaults, \
observing how COUNT(*) and COUNT(column) diverge, and how GROUP BY creates \
phantom NULL buckets. After cleaning up the contaminated data, it introduces \
the COALESCE/CTE pattern: a CTE wraps raw VALUES with COALESCE expressions \
that replace NULLs before the INSERT reaches the Delta table. Three batches \
demonstrate the pattern with varying mixes of explicit and defaulted columns, \
followed by an UPDATE to archive old entries.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "default-values", "coalesce", "cte", "audit"]
difficulty = "intermediate"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.audit_log"
