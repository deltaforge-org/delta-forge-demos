[demo]
id = "delta-null-handling"
name = "Customer Survey Data Cleansing"
version = "1.0.0"
author = "Delta Forge Team"
description = """
A SaaS company cleanses customer satisfaction survey data where many fields are \
optional. COALESCE replaces NULLs with sensible defaults, NULLIF converts sentinel \
values ('N/A', '') to proper NULLs, IS DISTINCT FROM enables safe NULL-aware \
comparisons, and NULL sorting controls how missing data appears in reports. \
Demonstrates NULL propagation in arithmetic and the critical difference between \
COUNT(*) vs COUNT(column) in aggregations.
"""
categories = ["delta-table", "null-handling"]
tags = ["delta-table", "intermediate", "coalesce", "nullif", "is-distinct-from", "null-sorting", "null-aggregation"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.survey_responses"
