[demo]
id = "delta-time-travel-row-diff"
name = "Delta Time Travel — Row-Level Change Detection"
version = "1.0.0"
author = "Delta Forge Team"
description = """
When Change Data Feed isn't enabled, time travel is your fallback for \
answering "what changed?" Self-JOINs and LEFT JOINs across VERSION AS OF \
snapshots let you detect modified, deleted, and inserted rows — essential \
for incident investigation, ETL validation, and data reconciliation. \
This demo walks through an e-commerce order system where a nightly ETL \
run introduced discrepancies, and an analyst uses cross-version queries \
to find every changed, deleted, and added row.
"""
categories = ["delta-table", "delta-versioning"]
tags = ["delta-table", "advanced", "time-travel", "change-detection", "self-join", "etl-validation"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.ecom_orders"
