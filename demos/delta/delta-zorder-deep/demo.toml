[demo]
id = "delta-zorder-deep"
name = "Delta Z-ORDER — Multi-Column Data Layout Optimization"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Z-ORDER is a Delta Lake optimization that reorganizes data files using a \
space-filling curve to co-locate rows with similar values across multiple \
columns, enabling efficient data skipping for multi-dimensional queries. \
Unlike single-column sorting, Z-ORDER balances locality across ALL specified \
columns simultaneously, so filters on region AND/OR sensor_type AND/OR date \
all benefit. \
This demo builds an IoT telemetry table in 3 batches, uses DESCRIBE DETAIL \
to observe the scattered file layout, applies OPTIMIZE ZORDER BY across 3 \
columns, then uses DESCRIBE DETAIL and DESCRIBE HISTORY to verify the \
compacted layout and shows how diverse query patterns benefit from the \
optimized data organization.
"""
categories = ["delta-table", "delta-performance"]
tags = ["delta-table", "advanced", "z-order", "optimize", "iot", "telemetry", "performance", "multi-column", "data-skipping", "describe-detail"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.sensor_telemetry"
