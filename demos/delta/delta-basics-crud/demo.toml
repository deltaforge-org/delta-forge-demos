[demo]
id = "delta-basics-crud"
name = "Delta Basics — Create, Insert, Update, Delete"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Delta Lake extends Parquet with a transaction log that enables full CRUD \
(Create, Read, Update, Delete) operations — something plain Parquet cannot do. \
Each mutation (INSERT, UPDATE, DELETE) creates a new version in the log, \
providing atomicity and a complete audit trail. This demo walks through all \
four operations on a products table, showing how Delta manages data files \
and versioning under the hood.
"""
categories = ["getting-started", "delta-table"]
tags = ["delta-table", "basic", "crud", "insert", "update", "delete", "create"]
difficulty = "basic"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.products"
