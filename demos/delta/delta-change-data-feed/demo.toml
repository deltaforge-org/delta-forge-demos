[demo]
id = "delta-change-data-feed"
name = "Delta Change Data Feed — Track Row-Level Changes"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Delta Change Data Feed (CDF) tracks row-level changes (inserts, updates, \
deletes) across table versions, enabling efficient incremental ETL pipelines. \
Without CDF, downstream consumers must re-read entire tables to detect what \
changed. This demo enables CDF on a customer accounts table, performs tier \
upgrades, additions, deletions, and balance adjustments across multiple \
versions, then inspects the resulting change history.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "cdf", "change-data-feed", "cdc", "audit", "versioning"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.cdf_customer_accounts"
