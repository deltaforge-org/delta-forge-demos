[demo]
id = "delta-append-only-enforcement"
name = "Delta Append-Only Ledger — Immutable Financial Compliance"
version = "1.0.0"
author = "Delta Forge Team"
description = """
A financial services firm builds an immutable transaction ledger using \
Delta's append-only table property. This demo creates the ledger with \
delta.appendOnly = true, verifies the configuration via DESCRIBE DETAIL \
and SHOW TBLPROPERTIES, appends multiple regulatory batches to prove \
the count-only-grows invariant, and uses DESCRIBE HISTORY to audit the \
complete operation timeline. The demo contrasts the append-only ledger \
against a mutable table where UPDATEs and DELETEs freely modify records \
— illustrating why immutability matters for regulatory compliance.
"""
categories = ["delta-table", "delta-compliance"]
tags = ["delta-table", "intermediate", "append-only", "compliance", "immutable", "audit", "ledger"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.compliance_ledger"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.mutable_ledger"
