[demo]
id = "delta-views-data-masking"
name = "Delta Views & Data Masking — Role-Based Access Layers"
version = "1.0.0"
author = "Delta Forge Team"
description = """
The MASK() function applies Delta Forge's pseudonymisation transforms inline \
in SQL expressions — redact, keyed_hash, generalize, encrypt, and tokenize. \
Unlike manual string concatenation, MASK() provides format-aware redaction \
(email, phone, card, SSN), deterministic hashing for JOINable pseudonyms, \
and date generalisation. This demo builds three role-based views on an \
e-commerce order table: an analyst view (keyed_hash pseudonyms for linkable \
but anonymous customer IDs), a support view (MASK-redacted card, email, and \
phone), and an executive view (pre-aggregated regional summaries).
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "views", "data-masking", "mask-function", "pseudonymisation", "access-control", "e-commerce", "security"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.customer_orders"
