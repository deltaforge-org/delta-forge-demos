[demo]
id = "delta-row-index-marketplace-search"
name = "Multi-Vendor Marketplace — Multiple Indexes on the Same Table"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Multi-vendor marketplace catalog with three high-traffic search shapes: \
SKU-exact lookup at the warehouse, brand-name filter on the storefront, \
and category-plus-price faceted search. Each shape benefits from a \
different index. The planner picks the cheapest applicable index per \
query without the caller having to choose. This demo seeds 70 listings, \
builds three indexes, and runs the queries each one was designed for, \
plus a query that none of them help (showing graceful fallback).
"""
categories = ["index"]
tags = ["delta-table", "advanced", "row-level-index", "multiple-indexes", "selector", "marketplace", "search"]
difficulty = "advanced"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.marketplace_listings"
