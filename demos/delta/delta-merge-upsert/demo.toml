[demo]
id = "delta-merge-upsert"
name = "Delta MERGE — CDC Upsert with BY SOURCE"
version = "2.0.0"
author = "DeltaForge Team"
description = """
The MERGE INTO upsert pattern is the foundation of change data capture \
(CDC) pipelines, atomically applying inserts, updates, and deletes from \
a staging source to a target table. The WHEN NOT MATCHED BY SOURCE clause \
is particularly powerful — it lets you detect and act on target rows that \
have no corresponding source record (e.g., removing discontinued products). \
This demo merges a daily supplier feed into a product catalog: updating \
prices, inserting new items, and cleaning up discontinued low-stock products.
"""
categories = ["delta-table", "delta-dml-merge"]
tags = ["delta-table", "intermediate", "merge", "upsert", "cdc", "matched", "not-matched", "by-source"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.upsert_products"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.product_feed"
