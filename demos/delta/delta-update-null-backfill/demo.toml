[demo]
id = "delta-update-null-backfill"
name = "Delta UPDATE NULL Backfill — Patient Data Recovery"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Hospital patient records migrated from a legacy database arrived with messy \
data: NULLs mixed with sentinel values (-999 for unknown age, 'N/A' for \
missing contacts, empty strings for insurance codes). This demo walks \
through eight UPDATE passes that systematically clean the data using \
NULLIF to convert sentinels to proper NULLs, COALESCE to backfill \
defaults like 'PENDING' and 'UNKNOWN', and CASE WHEN IS NULL for \
conditional replacement. Twenty-five patient records go from migration \
chaos to clean, queryable data — all with in-place UPDATE statements.
"""
categories = ["delta-table", "delta-dml-merge"]
tags = ["delta-table", "intermediate", "update", "null-handling", "coalesce", "nullif", "backfill", "data-recovery", "sentinel-values"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.backfill_demos.patient_records"
