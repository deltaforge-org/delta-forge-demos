[demo]
id = "orc-energy-meters"
name = "ORC Energy Meters — Utility Billing Analytics"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates ORC format at scale with 1,500 smart meter readings across \
3 monthly files (50 meters × 10 days × 3 months). Exercises advanced \
aggregation: HAVING, COUNT DISTINCT, FILTER clause, GROUP BY with \
multiple aggregates, and CTE-based analytics. Tests ORC handling of \
float64, boolean, and nullable columns at volume.\
"""
categories = ["orc", "aggregation"]
tags = ["orc", "advanced", "large-dataset", "aggregation", "having", "filter-clause", "multi-file"]
difficulty = "advanced"
estimated_time_minutes = 6

[demo.variables]
data_path = { description = "Path to the demo data directory", required = true }
zone_name = { description = "Target zone name", required = false }

[[demo.data_files]]
path = "data/readings_2026-01.orc"
format = "orc"
description = "January 2026 meter readings — 500 rows"
size_bytes = 31253

[[demo.data_files]]
path = "data/readings_2026-02.orc"
format = "orc"
description = "February 2026 meter readings — 500 rows"
size_bytes = 31202

[[demo.data_files]]
path = "data/readings_2026-03.orc"
format = "orc"
description = "March 2026 meter readings — 500 rows"
size_bytes = 31286

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.orc_energy.readings"
