[demo]
id = "json-typed-billing-events"
name = "JSON Typed Billing Events — type_hints + as_list"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Subscription billing webhook events delivered as Stripe-style NDJSON: numeric \
amounts and booleans arrive as quoted strings, tag arrays arrive as native JSON \
arrays. Exercises the json_flatten_config `type_hints` map (forces $.amount to \
int64, $.is_active and $.is_trialing to boolean, $.event_timestamp to timestamp) \
and `default_array_handling = 'as_list'` (lands $.tags as a real Arrow \
List<Utf8> instead of a JSON-string column). Aggregates (SUM(amount)), boolean \
filters, timestamp filters, and array_length / array_contains all work natively \
without CAST or json_array_* calls. A silver Delta promotion proves the typed \
columns and the ARRAY<STRING> column round-trip cleanly into Delta storage.\
"""
categories = ["json"]
tags = [
    "json",
    "intermediate",
    "type_hints",
    "as_list",
    "arrow_list",
    "typed",
    "billing",
    "webhook",
    "flatten",
    "bronze-silver",
]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the directory containing billing-event NDJSON files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/events_2024_part_01.ndjson"
format = "json"
description = "Billing webhook events — Jan/Feb/early-Mar 2024 (10 events)"
size_bytes = 2511

[[demo.data_files]]
path = "data/events_2024_part_02.ndjson"
format = "json"
description = "Billing webhook events — Mar/Apr/May 2024 (10 events)"
size_bytes = 2498

[[demo.data_files]]
path = "data/events_2024_part_03.ndjson"
format = "json"
description = "Billing webhook events — May/Jun/Jul 2024 (10 events)"
size_bytes = 2508

[[demo.data_files]]
path = "data/events_2024_part_04.ndjson"
format = "json"
description = "Billing webhook events — Aug/Sep/Oct 2024 (10 events)"
size_bytes = 2504

[[demo.data_files]]
path = "data/events_2024_part_05.ndjson"
format = "json"
description = "Billing webhook events — Oct/Nov/early-Dec 2024 (10 events)"
size_bytes = 2507

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.billing.events"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.billing.events_curated"
