[demo]
id = "typed-billing-events"
name = "JSON Typed Billing Events: Bronze Utf8 to Silver Typed via TRY_CAST"
version = "2.0.0"
author = "DeltaForge Team"
description = """\
Subscription billing webhook events delivered as Stripe-style NDJSON: numeric \
amounts and booleans arrive as quoted strings, tag arrays arrive as native JSON \
arrays. Demonstrates the canonical DeltaForge two-phase typing model. Bronze \
lands every column as Utf8 (no type coercion in the JSON reader, by design). \
Silver promotes scalars via TRY_CAST in the INSERT: amount to BIGINT, \
is_active and is_trialing to BOOLEAN, event_timestamp to TIMESTAMP. The tags \
array is kept as a JSON literal in silver and queried with JSON_ARRAY_LENGTH \
and LIKE, since DeltaForge has no first-class JSON-string-to-ARRAY function. \
SUM(amount), boolean filters, and timestamp comparisons all run natively \
against the typed silver columns without per-query CAST.\
"""
categories = ["json"]
tags = [
    "json",
    "intermediate",
    "try_cast",
    "type_promotion",
    "bronze-silver",
    "billing",
    "webhook",
    "flatten",
    "json_array_length",
]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the directory containing billing-event NDJSON files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/events_2024_part_01.json"
format = "json"
description = "Billing webhook events: Jan/Feb/early-Mar 2024 (10 events)"
size_bytes = 2511

[[demo.data_files]]
path = "data/events_2024_part_02.json"
format = "json"
description = "Billing webhook events: Mar/Apr/May 2024 (10 events)"
size_bytes = 2498

[[demo.data_files]]
path = "data/events_2024_part_03.json"
format = "json"
description = "Billing webhook events: May/Jun/Jul 2024 (10 events)"
size_bytes = 2508

[[demo.data_files]]
path = "data/events_2024_part_04.json"
format = "json"
description = "Billing webhook events: Aug/Sep/Oct 2024 (10 events)"
size_bytes = 2504

[[demo.data_files]]
path = "data/events_2024_part_05.json"
format = "json"
description = "Billing webhook events: Oct/Nov/early-Dec 2024 (10 events)"
size_bytes = 2507

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.billing.events"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.billing.events_curated"
