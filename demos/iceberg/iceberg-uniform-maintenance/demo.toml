[demo]
id = "iceberg-uniform-maintenance"
name = "Iceberg UniForm — OPTIMIZE & VACUUM Maintenance"
icon = "maintenance"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates table maintenance operations (OPTIMIZE compaction and VACUUM \
cleanup) on a UniForm-enabled Delta table, verifying that Iceberg metadata \
stays consistent throughout. Seeds 40 application log entries, adds two \
more batches to create file fragmentation, compacts with OPTIMIZE, deletes \
old DEBUG logs, then runs VACUUM to reclaim space. Every step verifies row \
counts and aggregates remain correct through both Delta and Iceberg readers. \
Dataset: application logs across 4 services and 5 log levels.
"""
categories = ["iceberg", "delta-table"]
tags = ["iceberg", "advanced", "uniform", "optimize", "vacuum", "maintenance", "compaction", "cleanup"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_demos.app_logs"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg_demos.app_logs_iceberg"
