[demo]
id = "iceberg-v1-warehouse-inventory"
name = "Iceberg V1 — Warehouse Inventory Snapshots"
version = "1.0.0"
author = "DeltaForge Team"
description = """\
Demonstrates native Apache Iceberg format-version 1 table reading using a \
retail warehouse inventory dataset (489 SKUs across 3 warehouses and 5 \
product categories). The table uses Iceberg v1 metadata with Avro manifest \
lists and manifests pointing to Parquet data files. Exercises Iceberg v1 \
metadata chain parsing, schema inference, warehouse-level aggregations, \
reorder-point analysis, and inventory valuation — all without conversion \
to Delta format.
"""
categories = ["iceberg"]
tags = ["iceberg", "basic", "read-only", "native-format", "v1", "metadata-chain", "warehouse", "inventory"]
difficulty = "basic"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "warehouse_inventory/data/00000-0-03375c72-6f1e-4b15-94de-7644d8e9f338.parquet"
format = "parquet"
description = "All 489 inventory SKU records (single Parquet data file)"
size_bytes = 24000

[[demo.data_files]]
path = "warehouse_inventory/metadata/00001-dedd1c58-e36e-4263-9597-5571e001439a.metadata.json"
format = "json"
description = "Iceberg format v1 metadata (schema, snapshots, partition specs)"
size_bytes = 3000

[[demo.data_files]]
path = "warehouse_inventory/metadata/snap-631888241796845274-0-03375c72-6f1e-4b15-94de-7644d8e9f338.avro"
format = "avro"
description = "Iceberg manifest list (Avro) — pointers to data manifests"
size_bytes = 800

[[demo.data_files]]
path = "warehouse_inventory/metadata/03375c72-6f1e-4b15-94de-7644d8e9f338-m0.avro"
format = "avro"
description = "Iceberg data manifest (Avro) — pointers to Parquet data files"
size_bytes = 700

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg_demos.warehouse_inventory"
