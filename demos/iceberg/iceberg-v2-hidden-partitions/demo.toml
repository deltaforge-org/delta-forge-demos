[demo]
id = "iceberg-v2-hidden-partitions"
name = "Iceberg V2 — Hidden Partitions (Ride-Share Trip Analytics)"
version = "1.0.0"
author = "Delta Forge Team"
icon = "iceberg-v2-hidden-partitions"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading with \
hidden partitioning via months(pickup_date). Hidden partitioning means the \
partition column does NOT appear in the data schema — queries filter on \
pickup_date and Iceberg transparently prunes partitions. The dataset contains \
300 ride-share trip records across 6 months (Jan–Jun 2025), 5 cities, 3 payment \
types, and 50 drivers. Data is spread across 6 monthly Parquet files. \
Exercises Iceberg partition pruning, NULL handling (tip_amount), and \
aggregation across hidden partition boundaries.
"""
categories = ["iceberg"]
tags = ["iceberg", "intermediate", "read-only", "native-format", "v2", "hidden-partitions", "months", "ride-share", "analytics"]
difficulty = "intermediate"
estimated_time_minutes = 6

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "trips/metadata/v2.metadata.json"
format = "json"
description = "Iceberg format v2 metadata with months(pickup_date) hidden partition spec"
size_bytes = 2414

