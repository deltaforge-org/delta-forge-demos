[demo]
id = "iceberg-native-partition-transforms"
name = "Iceberg Native — Partition Transforms (Bucket + Day)"
version = "1.0.0"
author = "Delta Forge Team"
icon = "bucket-partition"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading with \
Iceberg-native partition transforms: bucket(8, source_ip) and days(capture_time). \
These transforms are Iceberg-specific and cannot be produced by Delta Lake. \
The dataset contains 480 network traffic packet records across 3 regions \
(north-america, europe, asia-pacific), 4 protocols (TCP, UDP, ICMP, DNS), \
and 4 threat levels (low, medium, high, critical). Data is spread across 10 days \
of capture times and 78 partitioned Parquet files. Exercises Iceberg partition \
pruning, bucket-based data layout, and day-based temporal partitioning.
"""
categories = ["iceberg"]
tags = ["iceberg", "advanced", "read-only", "native-format", "v2", "partition-transforms", "bucket", "day", "network", "security"]
difficulty = "advanced"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "network_traffic/metadata/v2.metadata.json"
format = "json"
description = "Iceberg format v2 metadata with bucket(8, source_ip) + days(capture_time) partition spec"
size_bytes = 2411

[[demo.data_files]]
path = "network_traffic/metadata/snap-8454214707379975733-1-f160c1e0-ef5d-48f8-a24b-f71b95467660.avro"
format = "avro"
description = "Iceberg manifest list (Avro) — pointers to data manifests"
size_bytes = 4496

[[demo.data_files]]
path = "network_traffic/metadata/f160c1e0-ef5d-48f8-a24b-f71b95467660-m0.avro"
format = "avro"
description = "Iceberg data manifest (Avro) — pointers to 78 partitioned Parquet data files"
size_bytes = 14079

[[demo.data_files]]
path = "network_traffic/data/"
format = "parquet"
description = "78 partitioned Parquet data files across bucket(8) x days(10) partitions (~237 KB total)"
size_bytes = 237004

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg.network_traffic"
