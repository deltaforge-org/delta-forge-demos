[demo]
id = "iceberg-energy-grid-monitoring"
name = "Iceberg Energy Grid — Native Table Reading"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates native Apache Iceberg table reading using a smart energy grid \
monitoring dataset (600 meter readings across 3 regions). The table uses \
Iceberg format v2 metadata with Avro manifest lists and manifests pointing \
to Parquet data files. Exercises Iceberg metadata chain parsing, schema \
inference from Iceberg metadata.json, manifest-based file discovery, \
region-level aggregations, and Parquet row-group filtering — all without \
any conversion to Delta format.
"""
categories = ["iceberg", "energy"]
tags = ["iceberg", "beginner", "read-only", "native-format", "metadata-chain", "aggregation"]
difficulty = "beginner"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the demo directory containing the Iceberg table (metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "readings_north.parquet"
format = "parquet"
description = "North region — 200 meter readings"
size_bytes = 7938

[[demo.data_files]]
path = "readings_south.parquet"
format = "parquet"
description = "South region — 200 meter readings"
size_bytes = 7896

[[demo.data_files]]
path = "readings_east.parquet"
format = "parquet"
description = "East region — 200 meter readings"
size_bytes = 7913

[[demo.data_files]]
path = "metadata/v1.metadata.json"
format = "json"
description = "Iceberg format v2 metadata (schema, snapshots, partition specs)"
size_bytes = 2692

[[demo.data_files]]
path = "metadata/snap-1-manifest-list.avro"
format = "avro"
description = "Iceberg manifest list (Avro) — pointers to data manifests"
size_bytes = 783

[[demo.data_files]]
path = "metadata/snap-1-manifest.avro"
format = "avro"
description = "Iceberg data manifest (Avro) — pointers to 3 Parquet data files"
size_bytes = 711

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg.grid_readings"
