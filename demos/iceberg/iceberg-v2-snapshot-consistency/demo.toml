[demo]
id = "iceberg-v2-snapshot-consistency"
name = "Iceberg V2 — Snapshot Consistency"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Validates Iceberg format-version 2 snapshot consistency using a retail \
store inventory ledger. The table undergoes 4 snapshots: initial stock \
load (80 products across 4 categories), restocking INSERT (20 new \
products), price correction UPDATE (Electronics +8% via merge-on-read), \
and discontinuation DELETE (10 SKUs removed). Queries read the final \
consistent 90-row state and verify category breakdowns, price \
adjustments, new product presence, discontinued product absence, \
supplier analysis, inventory valuations, and snapshot history. \
Exercises the full Iceberg V2 merge-on-read path with multiple \
position delete files across UPDATE and DELETE operations.
"""
categories = ["iceberg"]
tags = ["iceberg", "intermediate", "read-only", "native-format", "v2", "snapshot-consistency", "merge-on-read", "position-deletes", "retail", "inventory"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

