[demo]
id = "iceberg-uniform-puffin-dv"
name = "Iceberg UniForm — Puffin Deletion Vector Write & Read"
version = "1.0.0"
author = "DeltaForge Team"
description = """\
Full-cycle demonstration of Iceberg V3 Puffin deletion vector generation \
via UniForm. Creates a Delta table with puffin-v1 delete mode enabled, \
seeds 10 products, deletes 3 products via standard DELETE, then reads the \
table back through an Iceberg external table to verify that the Puffin \
deletion vector (Roaring64Bitmap blob) correctly filters the deleted rows. \
Exercises the complete write → convert → read pipeline for V3-native \
deletion vectors.
"""
categories = ["iceberg"]
tags = ["iceberg", "intermediate", "uniform", "deletion-vectors", "puffin", "v3", "write-read", "full-cycle"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path for Delta table storage", required = true }
zone_name = { description = "Target zone name (defaults to 'demo_zone')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_demos.puffin_products"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg_demos.puffin_products_iceberg"
