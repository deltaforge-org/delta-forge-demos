[demo]
id = "iceberg-v2-fleet-telemetry"
name = "Iceberg V2 — Fleet Telemetry Analytics"
version = "1.0.0"
author = "DeltaForge Team"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading using a \
commercial fleet telemetry dataset (450 GPS pings across 3 regional fleets). \
The table uses Iceberg v2 metadata with enhanced column-level statistics, \
Avro manifest lists and manifests pointing to Parquet data files. Exercises \
Iceberg v2 metadata chain parsing, schema inference, fleet-level aggregations, \
safety analytics (harsh braking, speeding), and fuel monitoring — all without \
conversion to Delta format.
"""
categories = ["iceberg"]
tags = ["iceberg", "basic", "read-only", "native-format", "v2", "metadata-chain", "fleet", "telemetry", "iot"]
difficulty = "basic"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "fleet_telemetry/data/00000-0-7011101d-0466-4887-a211-ba053c1c016b.parquet"
format = "parquet"
description = "All 450 fleet telemetry GPS pings (single Parquet data file)"
size_bytes = 18000

[[demo.data_files]]
path = "fleet_telemetry/metadata/00001-83a75127-d9e4-4c35-9ff6-b91cff7e733f.metadata.json"
format = "json"
description = "Iceberg format v2 metadata (schema, snapshots, partition specs, column statistics)"
size_bytes = 4000

[[demo.data_files]]
path = "fleet_telemetry/metadata/snap-7379748317552446024-0-7011101d-0466-4887-a211-ba053c1c016b.avro"
format = "avro"
description = "Iceberg manifest list (Avro) — pointers to data manifests"
size_bytes = 800

[[demo.data_files]]
path = "fleet_telemetry/metadata/7011101d-0466-4887-a211-ba053c1c016b-m0.avro"
format = "avro"
description = "Iceberg data manifest (Avro) — pointers to Parquet data files"
size_bytes = 700

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg_demos.fleet_telemetry"
