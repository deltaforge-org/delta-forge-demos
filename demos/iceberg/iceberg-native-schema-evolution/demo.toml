[demo]
id = "iceberg-native-schema-evolution"
name = "Iceberg Native — Schema Evolution (Add, Rename, Drop)"
version = "1.0.0"
author = "Delta Forge Team"
icon = "schema-evolve"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading with \
schema evolution across 4 snapshots. The employee directory table starts \
with 5 columns and 300 rows, then evolves: ADD COLUMN title, INSERT 60 more \
employees with titles, ADD COLUMN location with UPDATE, and RENAME COLUMN \
dept TO department. Exercises Iceberg's field-id stability for column renames, \
NULL handling for columns added after initial data load, and multi-snapshot \
metadata chain resolution. The final schema has 7 columns and 360 rows.
"""
categories = ["iceberg"]
tags = ["iceberg", "advanced", "read-only", "native-format", "v2", "schema-evolution", "add-column", "rename-column", "field-id", "employee"]
difficulty = "advanced"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "employee_directory/metadata/v7.metadata.json"
format = "json"
description = "Iceberg format v2 metadata — latest snapshot after schema evolution (7 schema versions)"
size_bytes = 5733

