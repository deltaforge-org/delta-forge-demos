[demo]
id = "iceberg-v2-multi-partition"
name = "Iceberg V2 — Multi-Column Partitioning"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading with \
multi-column partitioning using a global weather station readings dataset \
(450 observations across 5 regions and 3 years). The table is partitioned \
by region (identity) and years(observation_date), producing 15 partitions. \
Exercises Iceberg v2 metadata chain parsing, multi-dimension partition \
pruning, cross-partition aggregations, NULL handling, and predicate pushdown \
on double columns — all without conversion to Delta format.
"""
categories = ["iceberg"]
tags = ["iceberg", "beginner", "read-only", "native-format", "v2", "partitioning", "multi-partition", "weather", "pruning"]
difficulty = "beginner"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "weather_readings/data/region=North+America/observation_date_year=2023/00000-1-c5930d75-0333-41b6-9ab5-8610323f5edf-0-00001.parquet"
format = "parquet"
description = "North America 2023 weather readings (30 rows)"
size_bytes = 3485

