[demo]
id = "iceberg-native-large-manifests"
name = "Iceberg Native — Large Manifests (Web Analytics)"
version = "1.0.0"
author = "Delta Forge Team"
icon = "scale-test"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading with \
many manifest files created by repeated micro-batch appends. A web \
analytics dataset of 600 session records is ingested across 10 separate \
append operations (60 rows each), producing 10 snapshots, 10 manifest \
lists, and 10 manifest files — each pointing to its own Parquet data \
file. This exercises the Iceberg metadata chain traversal: the reader \
must walk the current manifest list, resolve all 10 manifests, and \
union the data files to reconstruct the full table. Tests metadata \
parsing performance and correctness at manifest scale.
"""
categories = ["iceberg"]
tags = ["iceberg", "advanced", "read-only", "native-format", "v2", "manifests", "scale-test", "web-analytics", "micro-batch"]
difficulty = "advanced"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

