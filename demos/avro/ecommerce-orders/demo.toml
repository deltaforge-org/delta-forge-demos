[demo]
id = "avro-ecommerce-orders"
name = "Avro E-Commerce Orders — Logical Types & Nullable Unions"
version = "2.0.0"
description = """
Demonstrates Avro logical type support using 80 e-commerce orders across 2 quarterly files
with mixed compression (null, deflate). The schema exercises date (int logicalType),
timestamp-millis (long logicalType), nullable unions for discount_pct and notes,
and integer-based monetary values. Queries test date arithmetic, NULL coalescing,
revenue aggregation, and cross-file consistency.
"""
categories = ["avro", "ecommerce"]
tags = ["avro", "intermediate", "logical-types", "nullable-unions", "date", "timestamp", "compression", "multi-file"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the demo data directory", required = true }
zone_name = { description = "Target zone name", required = false }

[[demo.data_files]]
path = "data/orders_q1.avro"
format = "avro"
description = "Q1 2025 orders (40 rows, null compression) — date, long timestamp, nullable unions"
size_bytes = 4387

[[demo.data_files]]
path = "data/orders_q2.avro"
format = "avro"
description = "Q2 2025 orders (40 rows, deflate compression) — same schema, different codec"
size_bytes = 2147

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.ecommerce.all_orders"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.ecommerce.q1_orders"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.ecommerce.sample_orders"
