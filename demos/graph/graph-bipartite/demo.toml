[demo]
id = "graph-bipartite"
name = "Graph Bipartite — Movie Recommendation Engine"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Bipartite movie recommendation graph with 25 subscribers and 20 movies \
connected by ~84 rating edges. The two-type vertex graph enables \
collaborative filtering ("users who liked X also liked Y"), genre \
preference analysis, and taste similarity scoring. Queries demonstrate \
cross-type traversal patterns, 2-hop recommendation paths, and graph \
algorithms (PageRank, degree centrality, connected components) applied \
to a bipartite structure where subscribers and movies form distinct \
vertex partitions.
"""
categories = ["graph"]
tags = ["graph", "bipartite", "recommendation", "collaborative-filtering", "movie"]
difficulty = "intermediate"
estimated_time_minutes = 6

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "graph"
name = "{{zone_name}}.movie_recs.movie_recs"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.movie_recs.entities"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.movie_recs.ratings"
