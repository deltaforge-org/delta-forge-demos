[demo]
id = "graph-gpu-10m-finance"
name = "GPU-Accelerated Global Banking Network — 10M-Account Fraud Analytics"
version = "1.0.0"
author = "Delta Forge Team"
description = """
GPU-accelerated stress test on a 10,000,000-account global banking network \
with ~48,000,000 directed transaction edges. Models realistic financial \
topology: 30 banks, 25 cities, 3 account tiers (retail 80%, corporate 15%, \
institutional 5%). Dense intra-bank payment clusters, cross-bank clearing \
corridors, hierarchical advisory trees, compliance bridge nodes, and \
pseudo-random weak ties create community structure for fraud ring detection. \
Forces GPU execution on all 5 GPU-accelerable algorithms (PageRank, \
Connected Components, Louvain, Betweenness, Triangle Count) plus GPU MATCH \
expansion — 10x scale-up from the 1M-node GPU stress test. Tests GPU \
memory management, streaming property loading, and threshold fallback at \
enterprise financial-services scale. \
\
RESOURCE WARNING — RUN ON A HOST SIZED FOR THIS DEMO: the compute \
node's RSS peaks at roughly 10 GB during the heavy Cypher algorithms \
(PageRank, Louvain community detection, all-edge Triangle Count, and \
especially the betweenness-centrality sampling on 48M edges). The CSR \
topology build itself is far cheaper — memory pressure lives in the \
algorithm executors that materialise per-node scores, queues, and \
per-edge accumulators. Setup + first Cypher query take ~5-10 minutes \
on a modern workstation; run the HTTP client with DF_HTTP_TIMEOUT_SECS=0 \
(or at least 1800) so the first query doesn't trip a client-side \
timeout while the cold-path CSR loads. Recommended host size: 24 GB+ \
addressable memory so the OS, Delta Forge's working buffers, and \
DataFusion's query executor have headroom above the algorithm peak. \
If less is available, expect OOM during betweenness / community \
detection — drop to graph-gpu-stress-test (1M/5M) instead.
"""
categories = ["graph", "gpu"]
tags = ["graph", "gpu", "finance", "fraud-detection", "stress-test", "performance", "benchmark", "10-million-scale", "cypher", "algorithms", "advanced", "high-memory"]
difficulty = "advanced"
estimated_time_minutes = 60
# Peak resident memory observed on the compute node during this demo's
# heaviest queries (connected components + betweenness + triangle count
# against the full 48M-edge graph).  Display in the demo picker so users
# on laptops / small hosts can skip it.
peak_memory_gb = 10
recommended_host_memory_gb = 24

[demo.variables]
data_path = { description = "Path to the demo data directory", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "graph"
name = "{{zone_name}}.gpu_finance_network.gpu_finance_network"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.gpu_finance_network.gfn_banks"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.gpu_finance_network.gfn_accounts"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.gpu_finance_network.gfn_transactions"
