[demo]
id = "graph-manual-csr"
name = "Manual CSR Cache Management — Graph Performance Control"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Demonstrates the NO AUTO CACHE CSR graph attribute, which disables automatic \
Compressed Sparse Row (CSR) disk caching. By default, Delta Forge auto-writes \
a .dcsr file after every graph rebuild for fast subsequent loads (~70ms vs 6-14s). \
\
This demo creates a graph with auto-caching disabled, runs queries that rebuild \
from Delta tables each time (slow path), then manually triggers CREATE GRAPHCSR \
to build the disk cache. Re-running the same queries after caching proves \
identical results while using the fast disk-cached path. \
\
Use case: high-frequency write workloads where the edge/vertex tables change \
constantly and automatic CSR rebuilds would waste I/O. Operators manually \
refresh the cache during maintenance windows instead.
"""
categories = ["graph"]
tags = ["graph", "csr", "cache", "performance", "manual-csr", "advanced"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where demo data files are stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/edges.csv"
format = "csv"
description = "Edge list: 156 rows (78 undirected edges, both directions) with weight=1.0"
size_bytes = 3799

[[demo.data_files]]
path = "data/vertices.csv"
format = "csv"
description = "Vertex list: 34 club members with name and category (Instructor/President/Senior-Member/Member)"
size_bytes = 613

[[demo.target_objects]]
type = "graph"
name = "{{zone_name}}.karate_manual.karate_manual"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.karate_manual.vertices"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.karate_manual.edges"
