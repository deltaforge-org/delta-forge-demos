[demo]
id = "graph-ldbc-snb"
name = "LDBC Social Network Benchmark — Full Model Graph Verification"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Full LDBC Social Network Benchmark (SF0.1) with 8 entity types, 23 \
relationship types, and ~1.2 million rows. Verifies Delta Forge graph \
algorithms and Cypher queries against official golden values from the \
LDBC reference implementation validation parameters. \
\
Entities: Person (1,528), Comment (151K), Post (136K), Forum (14K), \
Place (1,460), Organisation (7,955), Tag (16K), TagClass (71). \
Relationships: KNOWS, HAS_CREATOR, IS_LOCATED_IN, REPLY_OF, HAS_TAG, \
CONTAINER_OF, HAS_MEMBER, HAS_MODERATOR, LIKES, STUDY_AT, WORK_AT, \
HAS_INTEREST, IS_PART_OF, HAS_TYPE, IS_SUBCLASS_OF, and more. \
\
Data source: https://ldbcouncil.org/benchmarks/snb/ (Scale Factor 0.1). \
CSV headers with dots and duplicates have been renamed for compatibility.
"""
categories = ["graph"]
tags = ["graph", "ldbc", "benchmark", "verification", "cypher", "pagerank", "shortest-path", "community-detection", "centrality", "advanced"]
difficulty = "advanced"
estimated_time_minutes = 15

[demo.variables]
data_path = { description = "Root path where demo data files are stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

# === Static Entity Files ===

[[demo.data_files]]
