[demo]
id = "graph-dolphins"
name = "Dolphins Social Network — Community Structure in the Wild"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Dolphins Social Network (Lusseau et al., 2003): a well-studied animal \
social network. 62 bottlenose dolphins observed in Doubtful Sound, \
New Zealand, with 159 undirected edges representing frequent associations. \
The network naturally splits into 2–4 communities, making it a popular \
benchmark for community detection algorithms. \
\
Verifies community detection, centrality, connected components, and degree \
distribution against published reference values. \
\
Data source: D. Lusseau et al., "The bottlenose dolphin community of \
Doubtful Sound features a large proportion of long-lasting associations," \
Behavioral Ecology and Sociobiology, 54:396-405, 2003.
"""
categories = ["graph"]
tags = ["graph", "dolphins", "social-network", "community-detection", "animal-behavior", "beginner"]
difficulty = "beginner"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where demo data files are stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/edges.csv"
format = "csv"
description = "Edge list: 318 rows (159 undirected edges, both directions) with weight=1.0"
size_bytes = 3095

[[demo.data_files]]
path = "data/vertices.csv"
format = "csv"
description = "Vertex list: 62 dolphins with name and social category"
size_bytes = 1153

[[demo.target_objects]]
type = "graph"
name = "dolphins_social"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.dolphins.vertices"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.dolphins.edges"
