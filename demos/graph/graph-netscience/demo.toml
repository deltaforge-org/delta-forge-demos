[demo]
id = "graph-netscience"
name = "NetScience — Coauthorship Network of Network Scientists"
version = "1.0.0"
author = "Delta Forge Team"
description = """
NetScience coauthorship network (Newman, 2006): a collaboration graph of \
scientists working in network theory and experiment. 1,461 vertices represent \
authors, 2,742 undirected edges (5,484 rows stored bidirectionally) capture \
coauthorship relationships with non-uniform weights reflecting collaboration \
strength. \
\
The network exhibits clear research-group community structure (modularity ~0.95) \
and contains isolated nodes and multiple connected components, making it an \
excellent intermediate benchmark for community detection, weighted graph \
algorithms, and component analysis. \
\
Data source: M. E. J. Newman, "Finding community structure in very large \
networks," Physical Review E 70, 066111, 2004. Dataset from Newman's network \
data repository.
"""
categories = ["graph"]
tags = ["graph", "coauthorship", "network-science", "weighted", "community-detection", "intermediate"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where demo data files are stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/edges.csv"
format = "csv"
description = "Edge list: 5,484 rows (2,742 undirected edges, both directions) with non-uniform weights"
size_bytes = 82433

[[demo.data_files]]
path = "data/vertices.csv"
format = "csv"
description = "Vertex list: 1,461 authors with name and research category"
size_bytes = 44699

[[demo.target_objects]]
type = "graph"
name = "{{zone_name}}.netscience_collab.netscience_collab"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.netscience_collab.vertices"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.netscience_collab.edges"
